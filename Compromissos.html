<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner Hugo Marcelo | Compromissos</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- =====================================================================
       ESTILOS SÓ DESTA PÁGINA
       ---------------------------------------------------------------------
       Tudo aqui usa as VARIÁVEIS do style.css (var(--accent), var(--panel)...)
       pra continuar trocando de tema sozinho. Não inventamos cores novas
       "chapadas": só nomes que já existem no uniforme do projeto.
       ===================================================================== -->
  <style>
    /* ---- Barra de ações (filtros + botões) ---- */
    .acoes {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
      gap: 14px; margin-bottom: 22px;
    }
    .filtros { display: flex; gap: 8px; flex-wrap: wrap; }
    .filtro {
      padding: 9px 16px; border-radius: 99px;
      background: var(--bg-soft); border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      transition: all .15s;
    }
    .filtro:hover { color: var(--text-strong); border-color: var(--accent); }
    .filtro.is-active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: var(--glow); }
    .acoes__botoes { display: flex; gap: 10px; }

    /* ---- A grade de cards: se ajusta sozinha (1 a N colunas) ---- */
    .compromissos { display: grid; gap: 18px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }

    /* ---- O CARD de cada compromisso ---- */
    .comp {
      background: var(--panel); border: 1px solid var(--border);
      border-left: 4px solid var(--accent);   /* a cor da categoria entra aqui via JS */
      border-radius: 16px; padding: 18px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .comp:hover { transform: translateY(-3px); box-shadow: 0 16px 34px -16px rgba(0,0,0,.6); }
    .comp.is-passado { opacity: .55; }

    .comp__topo { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .comp__tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Pílula da categoria (cor vem do JS) */
    .pill {
      font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 9px; border-radius: 7px; border: 1px solid transparent;
    }

    /* Etiqueta de "quanto tempo falta" — uma classe base + variações de cor */
    .badge {
      font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 9px; border-radius: 7px;
      background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-muted);
    }
    .badge--hoje    { background: #ef4444; border-color: #ef4444; color: #fff; animation: pulsar 1.4s ease-in-out infinite; }
    .badge--amanha  { background: #f59e0b; border-color: #f59e0b; color: #fff; }
    .badge--perto   { background: var(--accent-soft); border-color: transparent; color: var(--accent); }
    @keyframes pulsar { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

    /* Botões de editar/excluir dentro do card */
    .comp__acoes { display: flex; gap: 6px; flex-shrink: 0; }
    .mini {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-muted);
      display: grid; place-items: center; font-size: 11px; transition: all .15s;
    }
    .mini:hover { color: var(--text-strong); border-color: var(--accent); }
    .mini--perigo:hover { color: #ef4444; border-color: #ef4444; }

    /* Corpo do card: caixinha de data + título + hora */
    .comp__info { display: flex; align-items: center; gap: 12px; }
    .data-chip {
      flex-shrink: 0; min-width: 56px;
      background: var(--bg-soft); border: 1px solid var(--border); border-radius: 12px;
      padding: 8px 6px; text-align: center;
    }
    .data-chip__mes { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    .data-chip__dia { display: block; font-size: 22px; font-weight: 900; color: var(--text-strong); line-height: 1; }
    .comp__titulo { font-size: 15px; font-weight: 800; color: var(--text-strong); line-height: 1.25; }
    .comp__hora { font-size: 11px; font-weight: 700; color: var(--accent); margin-top: 3px; }

    /* Anotações resumidas no rodapé do card */
    .comp__notas {
      font-size: 11px; font-weight: 600; color: var(--text-muted); line-height: 1.5;
      padding-top: 10px; border-top: 1px solid var(--border);
    }

    /* Estado vazio (nenhum compromisso) */
    .vazio { text-align: center; color: var(--text-muted); padding: 60px 20px; }
    .vazio i { font-size: 42px; opacity: .4; margin-bottom: 12px; }
    .vazio p { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

    /* ---- Campos de formulário reutilizáveis nos modais ---- */
    .campo { margin-bottom: 16px; }
    .campo__label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .campo__label a { color: var(--accent); cursor: pointer; }
    .campo__input, .campo__select, .campo__area {
      width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; color: var(--text-strong);
      font-family: inherit; font-size: 13px; font-weight: 600; outline: none;
      transition: border-color .15s;
    }
    .campo__input:focus, .campo__select:focus, .campo__area:focus { border-color: var(--accent); }
    .campo__area { resize: vertical; min-height: 84px; }
    .campo--dupla { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ---- Gerenciador de categorias ---- */
    .nova-cat { display: flex; gap: 8px; margin-bottom: 16px; align-items: stretch; }
    .nova-cat .campo__input { flex: 1; }
    .nova-cat input[type="color"] { flex: 0 0 46px; width: 46px; padding: 4px; cursor: pointer; }
    .nova-cat .btn { flex: 0 0 auto; }
    .cat-linha {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px;
      background: var(--bg-soft); border: 1px solid var(--border); margin-bottom: 8px;
    }
    .cat-linha__nome { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700; }
    .cat-cor { width: 14px; height: 14px; border-radius: 99px; flex-shrink: 0; }

    /* Botões 100% de largura dentro do modal */
    .btn--bloco { width: 100%; justify-content: center; }

    /* Os seletores nativos (data/hora/cor) acompanham o tema do site */
    :root[data-theme="dark"]  .campo__input { color-scheme: dark; }
    :root[data-theme="light"] .campo__input { color-scheme: light; }

    /* Modais nunca passam da altura da tela: rolam por dentro no celular */
    #modal-comp .modal__box,
    #modal-cat  .modal__box { max-height: 90dvh; overflow-y: auto; }

    /* ---- AJUSTES DE CELULAR (telas estreitas) ---- */
    @media (max-width: 640px) {
      /* Empilha filtros e botões em vez de espremer tudo numa linha só */
      .acoes { flex-direction: column; align-items: stretch; }

      /* Os filtros viram uma faixa que rola pro lado (não quebram linha) */
      .filtros {
        flex-wrap: nowrap; overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px; scrollbar-width: none;
      }
      .filtros::-webkit-scrollbar { display: none; }
      .filtro { flex-shrink: 0; }

      /* "Categorias" e "Agendar" dividem a largura igualmente */
      .acoes__botoes .btn { flex: 1; }

      /* Alvos de toque um pouco maiores pro dedo */
      .mini { width: 32px; height: 32px; font-size: 12px; }

      /* Data e hora empilham pra não ficarem espremidas */
      .campo--dupla { grid-template-columns: 1fr; }
    }
  </style>
</head>

<!-- data-page="compromissos" diz ao app.js qual item do menu acender -->
<body class="app" data-page="compromissos">

  <div id="sidebar-container"></div>
  <div id="overlay" class="overlay" onclick="fecharMenu()"></div>

  <main class="main">

    <!-- Cabeçalho padrão -->
    <header class="header">
      <div class="header__left">
        <button class="btn btn--icon btn--menu" onclick="abrirMenu()" aria-label="Abrir menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div>
          <h1 class="header__title">Compromissos</h1>
          <p class="header__subtitle">Agenda & Eventos com hora marcada</p>
        </div>
      </div>
      <div class="header__actions">
        <button class="btn" onclick="abrirSync()">
          <i class="fa-solid fa-cloud-arrow-up" style="color: var(--accent)"></i>
          <span>Backup</span>
        </button>
        <button class="btn btn--icon" id="btn-tema" onclick="Tema.alternar()" aria-label="Trocar tema">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- ===================== CONTEÚDO DESTA PÁGINA ===================== -->
    <div class="container fade-up">

      <!-- Barra de ações: filtros à esquerda, botões à direita -->
      <div class="acoes">
        <div class="filtros">
          <button class="filtro is-active" data-filtro="todos"    onclick="filtrar('todos')">Todos</button>
          <button class="filtro"            data-filtro="proximos" onclick="filtrar('proximos')">Próximos 7 dias</button>
          <button class="filtro"            data-filtro="passados" onclick="filtrar('passados')">Passados</button>
        </div>
        <div class="acoes__botoes">
          <button class="btn" onclick="abrirCategorias()">
            <i class="fa-solid fa-tags"></i> <span>Categorias</span>
          </button>
          <button class="btn btn--primary" onclick="abrirCompromisso()">
            <i class="fa-solid fa-plus"></i> <span>Agendar</span>
          </button>
        </div>
      </div>

      <!-- A grade onde os cards são desenhados pelo JS -->
      <div class="compromissos" id="grade"></div>

    </div>

    <div id="footer-container"></div>
  </main>

  <!-- ===================== MODAL: AGENDAR / EDITAR ===================== -->
  <div id="modal-comp" class="modal">
    <div class="modal__box">
      <div class="modal__head">
        <h3 id="comp-titulo-janela"><i class="fa-solid fa-calendar-plus" style="color:var(--accent)"></i> Agendar compromisso</h3>
        <button class="modal__close" onclick="fecharCompromisso()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <!-- Campo escondido: guarda o id quando estamos EDITANDO -->
        <input type="hidden" id="f-id">

        <div class="campo">
          <label class="campo__label">Qual é o compromisso?</label>
          <input type="text" id="f-titulo" class="campo__input" placeholder="Ex: Consulta com o oftalmologista">
        </div>

        <div class="campo campo--dupla">
          <div>
            <label class="campo__label">Data</label>
            <input type="date" id="f-data" class="campo__input">
          </div>
          <div>
            <label class="campo__label">Horário</label>
            <input type="time" id="f-hora" class="campo__input">
          </div>
        </div>

        <div class="campo">
          <label class="campo__label">
            <span>Categoria</span>
            <a onclick="abrirCategorias()">Editar categorias</a>
          </label>
          <select id="f-categoria" class="campo__select"></select>
        </div>

        <div class="campo" style="margin-bottom:0;">
          <label class="campo__label">Anotações</label>
          <textarea id="f-notas" class="campo__area" placeholder="O que você precisa para este compromisso? Ex: levar documentos, chegar 15 min antes..."></textarea>
        </div>
      </div>
      <div class="modal__body" style="border-top:1px solid var(--border); flex-direction:row; justify-content:flex-end; gap:10px;">
        <button class="btn" onclick="fecharCompromisso()">Cancelar</button>
        <button class="btn btn--primary" onclick="salvarCompromisso()">
          <i class="fa-solid fa-check"></i> Salvar
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL: CATEGORIAS ===================== -->
  <div id="modal-cat" class="modal">
    <div class="modal__box">
      <div class="modal__head">
        <h3><i class="fa-solid fa-tags" style="color:var(--accent)"></i> Categorias</h3>
        <button class="modal__close" onclick="fecharCategorias()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <!-- Criar nova categoria: nome + cor -->
        <div class="nova-cat">
          <input type="text" id="cat-nome" class="campo__input" placeholder="Nome da nova categoria...">
          <input type="color" id="cat-cor" class="campo__input" value="#10b981">
          <button class="btn btn--primary" onclick="criarCategoria()"><i class="fa-solid fa-plus"></i></button>
        </div>
        <!-- Lista das categorias existentes -->
        <div id="lista-cat"></div>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL DE BACKUP (padrão, igual em toda página) ===================== -->
  <div id="modal-sync" class="modal">
    <div class="modal__box">
      <div class="modal__head">
        <h3><i class="fa-solid fa-cloud-arrow-up" style="color:var(--accent)"></i> Backup & Transferência</h3>
        <button class="modal__close" onclick="fecharSync()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <p>Sem nuvem por enquanto: use isto pra levar seus dados entre celular e computador.</p>
        <button class="btn btn--bloco" onclick="exportarBackup()">
          <i class="fa-solid fa-download"></i> Exportar (baixar arquivo)
        </button>
        <input type="file" id="input-import" accept=".json" onchange="importarBackup(event)" style="display:none;">
        <button class="btn btn--primary btn--bloco" onclick="document.getElementById('input-import').click()">
          <i class="fa-solid fa-upload"></i> Importar (restaurar backup)
        </button>
      </div>
    </div>
  </div>

  <!-- Cérebro compartilhado (sempre por último) -->
  <script src="app.js"></script>

  <!-- =====================================================================
       SCRIPT SÓ DESTA PÁGINA
       ---------------------------------------------------------------------
       Aqui mora TODA a lógica dos compromissos. Repare que NÃO mexemos
       em localStorage na mão: usamos o Store que o app.js já oferece.
       ===================================================================== -->
  <script>
    /* ---------------------------------------------------------------
       1) DADOS — nascem do Store. Se ainda não existe nada salvo,
          começamos com categorias padrão e uma lista vazia.
       --------------------------------------------------------------- */
    const CATEGORIAS_PADRAO = [
      { id: "cat_pessoal",      nome: "Pessoal",      cor: "#10b981" }, /* verde da marca */
      { id: "cat_profissional", nome: "Profissional", cor: "#0ea5e9" }, /* azul-céu        */
      { id: "cat_medico",       nome: "Médico",       cor: "#f43f5e" }, /* rosé (alerta)    */
      { id: "cat_estudos",      nome: "Estudos",      cor: "#a855f7" }, /* roxo            */
    ];

    let compromissos = Store.ler("compromissos", []);
    let categorias   = Store.ler("compromissos_categorias", CATEGORIAS_PADRAO);
    let filtroAtual  = "todos";

    // Guardar os dois "baús" de uma vez só
    function salvarTudo() {
      Store.salvar("compromissos", compromissos);
      Store.salvar("compromissos_categorias", categorias);
    }

    /* ---------------------------------------------------------------
       2) AJUDANTES DE DATA — o coração do "quanto tempo falta"
       --------------------------------------------------------------- */

    // Quantos dias faltam? Positivo = futuro, 0 = hoje, negativo = passado
    function diasFaltantes(dataIso) {
      const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
      const alvo = new Date(dataIso + "T00:00:00"); alvo.setHours(0, 0, 0, 0);
      const umDia = 1000 * 60 * 60 * 24;                 // milissegundos num dia
      return Math.round((alvo - hoje) / umDia);
    }

    // O compromisso já passou? (considera data + hora; sem hora = fim do dia)
    function jaPassou(dataIso, hora) {
      const alvo = new Date(`${dataIso}T${hora || "23:59"}:00`);
      return alvo < new Date();
    }

    // 2025-06-08 -> "08/06"  (pega dia e mês pra caixinha do card)
    function dia(dataIso)  { return dataIso.split("-")[2]; }
    const MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    function mes(dataIso)  { return MESES[Number(dataIso.split("-")[1]) - 1]; }

    // Transforma "#10b981" + transparência num rgba pra fundo suave da pílula
    function corSuave(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // Monta a ETIQUETA de tempo (texto + classe de cor) a partir dos dias
    function etiquetaTempo(dataIso, hora) {
      const passou = jaPassou(dataIso, hora);
      const d = diasFaltantes(dataIso);

      if (passou)        return { texto: d === 0 ? "Foi hoje" : `Há ${Math.abs(d)} dia(s)`, classe: "" };
      if (d === 0)       return { texto: "Hoje!",        classe: "badge--hoje" };
      if (d === 1)       return { texto: "Amanhã",       classe: "badge--amanha" };
      if (d <= 7)        return { texto: `Faltam ${d} dias`, classe: "badge--perto" };
      return                    { texto: `Faltam ${d} dias`, classe: "" };
    }

    /* ---------------------------------------------------------------
       3) DESENHAR OS CARDS na tela (renderizar)
       --------------------------------------------------------------- */
    function render() {
      const grade = document.getElementById("grade");

      // (a) Filtrar conforme o botão escolhido
      let lista = compromissos.filter((c) => {
        if (filtroAtual === "passados") return jaPassou(c.data, c.hora);
        if (filtroAtual === "proximos") return !jaPassou(c.data, c.hora) && diasFaltantes(c.data) <= 7;
        return true; // "todos"
      });

      // (b) Ordenar: futuros do mais próximo ao mais distante; passados do mais recente
      lista.sort((a, b) => {
        const da = new Date(`${a.data}T${a.hora || "00:00"}`);
        const db = new Date(`${b.data}T${b.hora || "00:00"}`);
        return filtroAtual === "passados" ? db - da : da - db;
      });

      // (c) Nada pra mostrar?
      if (lista.length === 0) {
        grade.innerHTML = `
          <div class="vazio" style="grid-column:1/-1;">
            <i class="fa-regular fa-calendar-xmark"></i>
            <p>Nenhum compromisso por aqui</p>
          </div>`;
        return;
      }

      // (d) Desenhar cada card
      grade.innerHTML = lista.map((c) => {
        const cat = categorias.find((x) => x.id === c.categoriaId)
                  || { nome: "Sem categoria", cor: "#9ca3af" };
        const passou = jaPassou(c.data, c.hora);
        const et = etiquetaTempo(c.data, c.hora);
        const notas = c.notas
          ? (c.notas.length > 90 ? c.notas.slice(0, 90) + "..." : c.notas)
          : "Sem anotações.";

        return `
          <div class="comp ${passou ? "is-passado" : ""}" style="border-left-color:${cat.cor}">
            <div class="comp__topo">
              <div class="comp__tags">
                <span class="pill" style="color:${cat.cor}; background:${corSuave(cat.cor, .12)}; border-color:${corSuave(cat.cor, .25)}">${cat.nome}</span>
                <span class="badge ${et.classe}">${et.texto}</span>
              </div>
              <div class="comp__acoes">
                <button class="mini" onclick="editarCompromisso(${c.id})" aria-label="Editar"><i class="fa-solid fa-pen"></i></button>
                <button class="mini mini--perigo" onclick="excluirCompromisso(${c.id})" aria-label="Excluir"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>

            <div class="comp__info">
              <div class="data-chip">
                <span class="data-chip__mes">${mes(c.data)}</span>
                <span class="data-chip__dia">${dia(c.data)}</span>
              </div>
              <div style="min-width:0;">
                <div class="comp__titulo">${c.titulo}</div>
                <div class="comp__hora"><i class="fa-regular fa-clock"></i> ${c.hora || "O dia todo"}</div>
              </div>
            </div>

            <p class="comp__notas"><i class="fa-solid fa-align-left" style="opacity:.5; margin-right:4px;"></i>${notas}</p>
          </div>`;
      }).join("");
    }

    /* ---------------------------------------------------------------
       4) FILTROS — acende o botão e re-desenha
       --------------------------------------------------------------- */
    function filtrar(f) {
      filtroAtual = f;
      document.querySelectorAll(".filtro").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.filtro === f);
      });
      render();
    }

    /* ---------------------------------------------------------------
       5) MODAL DE COMPROMISSO — abrir, editar, salvar, excluir
       (reusa as classes .modal / .is-open do style.css)
       --------------------------------------------------------------- */
    function preencherSelectCategorias() {
      document.getElementById("f-categoria").innerHTML =
        categorias.map((c) => `<option value="${c.id}">${c.nome}</option>`).join("");
    }

    function abrirCompromisso() {
      preencherSelectCategorias();
      document.getElementById("f-id").value = "";
      document.getElementById("f-titulo").value = "";
      document.getElementById("f-data").value = "";
      document.getElementById("f-hora").value = "";
      document.getElementById("f-notas").value = "";
      document.getElementById("comp-titulo-janela").innerHTML =
        '<i class="fa-solid fa-calendar-plus" style="color:var(--accent)"></i> Agendar compromisso';
      document.getElementById("modal-comp").classList.add("is-open");
    }

    function editarCompromisso(id) {
      const c = compromissos.find((x) => x.id === id);
      if (!c) return;
      preencherSelectCategorias();
      document.getElementById("f-id").value = c.id;
      document.getElementById("f-titulo").value = c.titulo;
      document.getElementById("f-data").value = c.data;
      document.getElementById("f-hora").value = c.hora || "";
      document.getElementById("f-categoria").value = c.categoriaId;
      document.getElementById("f-notas").value = c.notas || "";
      document.getElementById("comp-titulo-janela").innerHTML =
        '<i class="fa-solid fa-pen" style="color:var(--accent)"></i> Editar compromisso';
      document.getElementById("modal-comp").classList.add("is-open");
    }

    function fecharCompromisso() {
      document.getElementById("modal-comp").classList.remove("is-open");
    }

    function salvarCompromisso() {
      const titulo = document.getElementById("f-titulo").value.trim();
      const data   = document.getElementById("f-data").value;
      if (!titulo || !data) {
        alert("Preencha pelo menos o compromisso e a data.");
        return;
      }
      const dados = {
        titulo,
        data,
        hora:        document.getElementById("f-hora").value,
        categoriaId: document.getElementById("f-categoria").value,
        notas:       document.getElementById("f-notas").value.trim(),
      };
      const idEditando = document.getElementById("f-id").value;

      if (idEditando) {
        // Editando: acha pelo id e atualiza
        const i = compromissos.findIndex((x) => x.id == idEditando);
        compromissos[i] = { ...compromissos[i], ...dados };
      } else {
        // Novo: id único pelo relógio
        compromissos.push({ id: Date.now(), ...dados });
      }
      salvarTudo();
      fecharCompromisso();
      render();
    }

    function excluirCompromisso(id) {
      if (!confirm("Tem certeza que quer excluir este compromisso?")) return;
      compromissos = compromissos.filter((x) => x.id !== id);
      salvarTudo();
      render();
    }

    /* ---------------------------------------------------------------
       6) MODAL DE CATEGORIAS — criar, listar, excluir
       --------------------------------------------------------------- */
    function abrirCategorias()  { renderCategorias(); document.getElementById("modal-cat").classList.add("is-open"); }
    function fecharCategorias() {
      document.getElementById("modal-cat").classList.remove("is-open");
      render(); // os cards podem ter mudado de cor/nome
    }

    function renderCategorias() {
      document.getElementById("lista-cat").innerHTML = categorias.map((c) => `
        <div class="cat-linha">
          <span class="cat-linha__nome">
            <span class="cat-cor" style="background:${c.cor}"></span>${c.nome}
          </span>
          <button class="mini mini--perigo" onclick="excluirCategoria('${c.id}')"><i class="fa-solid fa-trash"></i></button>
        </div>`).join("");
    }

    function criarCategoria() {
      const nome = document.getElementById("cat-nome").value.trim();
      const cor  = document.getElementById("cat-cor").value;
      if (!nome) return;
      categorias.push({ id: "cat_" + Date.now(), nome, cor });
      document.getElementById("cat-nome").value = "";
      salvarTudo();
      renderCategorias();
    }

    function excluirCategoria(id) {
      // Não deixa apagar categoria que está em uso (evita card "órfão")
      if (compromissos.some((c) => c.categoriaId === id)) {
        alert("Existem compromissos usando esta categoria. Troque a categoria deles antes.");
        return;
      }
      if (!confirm("Excluir esta categoria?")) return;
      categorias = categorias.filter((x) => x.id !== id);
      salvarTudo();
      renderCategorias();
    }

    /* ---------------------------------------------------------------
       7) PARTIDA — desenha tudo assim que a página carrega
       --------------------------------------------------------------- */
    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
