<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner Hugo Marcelo | Anotações</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- ===================================================================
       ESTILO SÓ DESTA PÁGINA (prefixo "an-" = anotações).
       Tudo aqui é exclusivo das Anotações. O visual geral (cards, botões,
       cores da marca) continua vindo do style.css. As cores pastéis das
       notas usam color-mix() sobre o --panel: ficam suaves nos DOIS temas.
       =================================================================== -->
  <style>
    /* ----- Composer rápido (estilo Keep "Criar uma nota...") ----- */
    .an-quick {
      max-width: 640px; margin: 0 auto 26px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; box-shadow: var(--shadow);
      overflow: hidden; transition: box-shadow .2s;
    }
    .an-quick.is-open { box-shadow: var(--shadow), var(--glow); }
    .an-quick__collapsed {
      display: flex; align-items: center; gap: 10px; padding: 6px 8px 6px 16px;
    }
    .an-quick__collapsed input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-strong); font-family: inherit; font-size: 14px; font-weight: 600;
      padding: 12px 0;
    }
    .an-quick__collapsed input::placeholder { color: var(--text-muted); }
    .an-quick.is-open .an-quick__collapsed { display: none; }

    .an-quick__open { display: none; padding: 14px 16px 12px; }
    .an-quick.is-open .an-quick__open { display: block; }
    .an-quick__titulo {
      width: 100%; background: none; border: none; outline: none;
      color: var(--text-strong); font-family: inherit; font-size: 15px; font-weight: 800;
      margin-bottom: 8px;
    }
    .an-quick__corpo {
      width: 100%; min-height: 70px; resize: vertical;
      background: none; border: none; outline: none;
      color: var(--text-strong); font-family: inherit; font-size: 14px; font-weight: 500; line-height: 1.6;
    }
    .an-quick__titulo::placeholder, .an-quick__corpo::placeholder { color: var(--text-muted); }
    .an-quick__rodape {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }

    /* ----- Botões "fantasma" pequenos (ícone redondo) ----- */
    .an-ghost {
      width: 38px; height: 38px; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-soft); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 14px; transition: all .15s;
    }
    .an-ghost:hover { color: var(--accent); border-color: var(--accent); }

    /* ----- Barra de ferramentas (busca + filtros + ações) ----- */
    .an-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .an-search { position: relative; flex: 1 1 240px; }
    .an-search i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 13px;
    }
    .an-search input {
      width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px 12px 38px;
      color: var(--text-strong); font-family: inherit; font-size: 13px; font-weight: 600;
      outline: none; transition: border-color .15s;
    }
    .an-search input:focus { border-color: var(--accent); }

    .an-filtros {
      display: flex; gap: 8px; overflow-x: auto; flex: 1 1 100%;
      padding-bottom: 4px; order: 3;
    }
    .an-filtros::-webkit-scrollbar { height: 5px; }
    .an-chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: 99px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; white-space: nowrap;
      transition: all .15s;
    }
    .an-chip:hover { color: var(--text-strong); border-color: var(--accent); }
    .an-chip.is-active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: var(--glow); }

    /* ----- Medidor de espaço (~5MB do navegador) ----- */
    .an-meter { flex: 1 1 100%; order: 4; }
    .an-meter__top {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .an-meter__bar { height: 6px; border-radius: 99px; background: var(--bg-soft); overflow: hidden; }
    .an-meter__fill { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; transition: width .3s, background .3s; }
    .an-meter__fill.is-cheio { background: #ef4444; }

    /* ----- Abas Ativas / Arquivadas ----- */
    .an-tabs { display: flex; gap: 8px; margin-bottom: 22px; }
    .an-tab {
      padding: 9px 18px; border-radius: 10px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; transition: all .15s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .an-tab:hover { color: var(--text-strong); }
    .an-tab.is-active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: var(--glow); }

    /* ----- Grade em colunas (masonry estilo Keep) ----- */
    .an-grid { columns: 1; column-gap: 18px; }
    @media (min-width: 640px)  { .an-grid { columns: 2; } }
    @media (min-width: 1000px) { .an-grid { columns: 3; } }
    @media (min-width: 1320px) { .an-grid { columns: 4; } }

    /* ----- O CARD de nota ----- */
    .an-card {
      break-inside: avoid; margin: 0 0 18px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow); transition: transform .15s, box-shadow .15s, border-color .15s;
      position: relative;
    }
    .an-card:hover { transform: translateY(-2px); box-shadow: var(--shadow), var(--glow); }
    /* Cor de fundo pastel: mistura a cor escolhida com o painel atual */
    .an-card.an-card--cor {
      background: color-mix(in srgb, var(--an-c) 13%, var(--panel));
      border-color: color-mix(in srgb, var(--an-c) 32%, var(--border));
    }
    .an-card__pin {
      position: absolute; top: 10px; right: 12px; z-index: 2;
      color: var(--accent); font-size: 13px; transform: rotate(40deg);
    }
    .an-card__img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
    .an-card__body { padding: 16px 16px 12px; }
    .an-badge {
      display: inline-block; font-size: 8px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 9px; border-radius: 6px; border: 1px solid; margin-bottom: 10px;
    }
    .an-card__titulo {
      font-size: 14px; font-weight: 800; color: var(--text-strong);
      line-height: 1.3; margin-bottom: 8px; word-break: break-word;
    }
    .an-card__texto {
      font-size: 12.5px; font-weight: 500; color: var(--text-muted);
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .an-card__check { display: flex; flex-direction: column; gap: 7px; margin-top: 2px; }
    .an-citem {
      display: flex; align-items: flex-start; gap: 9px; cursor: pointer;
      font-size: 12.5px; font-weight: 500; color: var(--text-strong); line-height: 1.5;
    }
    .an-citem i { color: var(--text-muted); font-size: 14px; margin-top: 1px; }
    .an-citem.is-feito { color: var(--text-muted); }
    .an-citem.is-feito span { text-decoration: line-through; opacity: .7; }
    .an-citem.is-feito i { color: var(--accent); }
    .an-mais { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .an-card__foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 8px 8px 16px; border-top: 1px solid var(--border);
      gap: 6px;
    }
    .an-card__data { font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }
    .an-actions { display: flex; gap: 2px; }
    .an-act {
      width: 30px; height: 30px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 12px; transition: all .15s;
    }
    .an-act:hover { background: var(--bg-soft); color: var(--accent); }
    .an-act.is-on { color: var(--accent); }
    .an-act--del:hover { color: #ef4444; }

    /* ----- Estado vazio ----- */
    .an-vazio { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .an-vazio i { font-size: 38px; opacity: .25; margin-bottom: 14px; }
    .an-vazio p { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; opacity: .7; }

    /* ----- Leque de cores (no editor e no quick) ----- */
    .an-cores { display: flex; flex-wrap: wrap; gap: 8px; }
    .an-cor {
      width: 28px; height: 28px; border-radius: 99px; cursor: pointer;
      border: 2px solid var(--border); position: relative; transition: transform .12s;
    }
    .an-cor:hover { transform: scale(1.12); }
    .an-cor.is-sel { border-color: var(--text-strong); }
    .an-cor.is-sel::after {
      content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900;
      position: absolute; inset: 0; display: grid; place-items: center;
      font-size: 10px; color: var(--text-strong);
    }
    .an-cor--padrao { background: var(--bg-soft); }

    /* ----- Popover de cor (clicado a partir do card) ----- */
    .an-pop {
      position: fixed; z-index: 200; display: none;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px; box-shadow: var(--shadow);
      max-width: 180px;
    }
    .an-pop.is-open { display: block; }

    /* ----- Editor (modal grande) ----- */
    .an-modal-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 18px; width: 100%; max-width: 600px;
      box-shadow: var(--shadow); display: flex; flex-direction: column;
      max-height: 90vh; animation: pop .25s ease;
    }
    .an-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .an-modal-head h3 { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    .an-modal-body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .an-modal-foot {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px; border-top: 1px solid var(--border); background: var(--panel);
    }
    .an-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; display: block; }

    .an-input {
      width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text-strong); font-family: inherit; font-size: 14px; font-weight: 600; outline: none;
    }
    .an-input:focus { border-color: var(--accent); }
    textarea.an-input { min-height: 160px; resize: vertical; line-height: 1.6; font-weight: 500; }
    select.an-input { cursor: pointer; }

    /* Alternador Texto / Lista */
    .an-types { display: inline-flex; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .an-type {
      padding: 8px 16px; border-radius: 8px; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .an-type.is-active { background: var(--accent); color: #fff; }

    /* Editor de checklist */
    .an-itens { display: flex; flex-direction: column; gap: 8px; }
    .an-item-edit { display: flex; align-items: center; gap: 10px; }
    .an-item-edit input[type="text"] {
      flex: 1; background: var(--bg-soft); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text-strong);
      font-family: inherit; font-size: 13px; font-weight: 500; outline: none;
    }
    .an-item-edit input[type="text"]:focus { border-color: var(--accent); }
    .an-item-edit button { color: var(--text-muted); font-size: 13px; width: 30px; height: 30px; border-radius: 8px; }
    .an-item-edit button:hover { color: #ef4444; background: var(--bg-soft); }
    .an-add-item { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 7px; padding: 6px 0; }

    /* Miniaturas de imagens no editor */
    .an-thumbs { display: flex; flex-wrap: wrap; gap: 10px; }
    .an-thumb { position: relative; width: 84px; height: 84px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .an-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .an-thumb button {
      position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; border-radius: 99px;
      background: rgba(0,0,0,.65); color: #fff; font-size: 10px;
      display: grid; place-items: center;
    }

    /* Lista do gerenciador de categorias */
    .an-taglist { display: flex; flex-direction: column; gap: 8px; }
    .an-tagrow {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-soft); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    }

    @media (max-width: 600px) {
      .an-toolbar { gap: 10px; }
      .an-card__img { max-height: 180px; }
    }
  </style>
</head>

<body class="app" data-page="anotacoes">

  <div id="sidebar-container"></div>
  <div id="overlay" class="overlay" onclick="fecharMenu()"></div>

  <main class="main">

    <header class="header">
      <div class="header__left">
        <button class="btn btn--icon btn--menu" onclick="abrirMenu()" aria-label="Abrir menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div>
          <h1 class="header__title">Anotações</h1>
          <p class="header__subtitle">Seu segundo cérebro</p>
        </div>
      </div>
      <div class="header__actions">
        <button class="btn" onclick="abrirSync()">
          <i class="fa-solid fa-cloud-arrow-up" style="color: var(--accent)"></i>
          <span>Backup</span>
        </button>
        <button class="btn btn--icon" id="btn-tema" onclick="Tema.alternar()" aria-label="Trocar tema">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <div class="container fade-up">

      <!-- ============ COMPOSER RÁPIDO (estilo Keep) ============ -->
      <div class="an-quick" id="an-quick">
        <!-- Estado fechado: só um campo convidando a escrever -->
        <div class="an-quick__collapsed">
          <input type="text" id="an-quick-trigger" placeholder="Criar uma nota..." onfocus="abrirQuick()">
          <button class="an-ghost" title="Nova lista" onclick="quickParaEditor('checklist')"><i class="fa-solid fa-list-check"></i></button>
          <button class="an-ghost" title="Com imagem" onclick="quickParaEditor('imagem')"><i class="fa-regular fa-image"></i></button>
        </div>
        <!-- Estado aberto: título + corpo + cor + ações -->
        <div class="an-quick__open">
          <input type="text" id="an-quick-titulo" class="an-quick__titulo" placeholder="Título">
          <textarea id="an-quick-corpo" class="an-quick__corpo" placeholder="Escreva uma nota..."></textarea>
          <div class="an-cores" id="an-quick-cores" style="margin-top:6px"></div>
          <div class="an-quick__rodape">
            <div style="display:flex; gap:8px;">
              <button class="an-ghost" title="Vira lista" onclick="quickParaEditor('checklist')"><i class="fa-solid fa-list-check"></i></button>
              <button class="an-ghost" title="Adicionar imagem" onclick="quickParaEditor('imagem')"><i class="fa-regular fa-image"></i></button>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <button class="btn" onclick="fecharQuick()">Fechar</button>
              <button class="btn btn--primary" onclick="salvarQuick()"><i class="fa-solid fa-check"></i> Salvar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ============ BARRA DE FERRAMENTAS ============ -->
      <div class="an-toolbar">
        <div class="an-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="an-busca" placeholder="Pesquisar nas suas notas..." oninput="render()">
        </div>
        <button class="an-ghost" title="Gerenciar categorias" onclick="abrirTags()" style="width:42px;height:42px;"><i class="fa-solid fa-tags"></i></button>
        <button class="btn btn--primary" onclick="abrirEditor()" style="height:42px;"><i class="fa-solid fa-plus"></i> Nova nota</button>

        <!-- Filtros por categoria (gerados pelo JS) -->
        <div class="an-filtros" id="an-filtros"></div>

        <!-- Medidor de espaço usado -->
        <div class="an-meter">
          <div class="an-meter__top">
            <span><i class="fa-solid fa-database"></i> Espaço usado</span>
            <span id="an-meter-txt">0 MB de ~5 MB</span>
          </div>
          <div class="an-meter__bar"><div class="an-meter__fill" id="an-meter-fill"></div></div>
        </div>
      </div>

      <!-- ============ ABAS ============ -->
      <div class="an-tabs">
        <button class="an-tab is-active" id="an-tab-ativas" onclick="mudarAba('ativas')"><i class="fa-regular fa-note-sticky"></i> Ativas</button>
        <button class="an-tab" id="an-tab-arquivo" onclick="mudarAba('arquivo')"><i class="fa-solid fa-box-archive"></i> Arquivadas</button>
      </div>

      <!-- ============ GRADES DE NOTAS ============ -->
      <div id="an-conteudo-ativas">
        <div class="an-grid" id="an-grid-ativas"></div>
      </div>
      <div id="an-conteudo-arquivo" style="display:none">
        <div class="an-grid" id="an-grid-arquivo"></div>
      </div>

    </div>

    <div id="footer-container"></div>
  </main>

  <!-- ============ POPOVER DE COR (acionado pelo card) ============ -->
  <div class="an-pop" id="an-pop-cor">
    <span class="an-label" style="margin-bottom:8px">Cor da nota</span>
    <div class="an-cores" id="an-pop-cores"></div>
  </div>

  <!-- ============ MODAL: EDITOR DE NOTA ============ -->
  <div id="an-modal-nota" class="modal">
    <div class="an-modal-box">
      <div class="an-modal-head">
        <h3><i class="fa-solid fa-pen-clip" style="color:var(--accent)"></i> <span id="an-modal-titulo">Nova nota</span></h3>
        <button class="modal__close" onclick="fecharModal('an-modal-nota')"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="an-modal-body">
        <input type="text" id="an-ed-titulo" class="an-input" placeholder="Título da nota" style="font-weight:800; font-size:16px;">

        <!-- Texto ou Lista? -->
        <div>
          <span class="an-label">Tipo</span>
          <div class="an-types">
            <button class="an-type is-active" id="an-type-texto" onclick="mudarTipoEditor('texto')"><i class="fa-solid fa-align-left"></i> Texto</button>
            <button class="an-type" id="an-type-checklist" onclick="mudarTipoEditor('checklist')"><i class="fa-solid fa-list-check"></i> Lista</button>
          </div>
        </div>

        <!-- Bloco de texto -->
        <div id="an-bloco-texto">
          <textarea id="an-ed-corpo" class="an-input" placeholder="Descarregue suas ideias aqui..."></textarea>
        </div>

        <!-- Bloco de checklist -->
        <div id="an-bloco-checklist" style="display:none">
          <span class="an-label">Itens da lista</span>
          <div class="an-itens" id="an-ed-itens"></div>
          <button class="an-add-item" onclick="addItem()"><i class="fa-solid fa-plus"></i> Adicionar item</button>
        </div>

        <!-- Cor de fundo -->
        <div>
          <span class="an-label">Cor de fundo</span>
          <div class="an-cores" id="an-ed-cores"></div>
        </div>

        <!-- Categoria -->
        <div>
          <span class="an-label">Categoria</span>
          <select id="an-ed-tag" class="an-input"></select>
        </div>

        <!-- Imagens -->
        <div>
          <span class="an-label">Imagens (anexos leves)</span>
          <div class="an-thumbs" id="an-ed-thumbs" style="margin-bottom:10px"></div>
          <input type="file" id="an-ed-file" accept="image/*" multiple style="display:none" onchange="anexarImagens(event)">
          <button class="btn" onclick="document.getElementById('an-ed-file').click()"><i class="fa-regular fa-image"></i> Adicionar imagem</button>
        </div>
      </div>

      <div class="an-modal-foot">
        <button class="an-act an-act--del" id="an-ed-excluir" onclick="excluirDoEditor()" title="Excluir nota" style="width:38px;height:38px;display:none"><i class="fa-solid fa-trash-can"></i></button>
        <div style="margin-left:auto; display:flex; gap:10px;">
          <button class="btn" onclick="fecharModal('an-modal-nota')">Cancelar</button>
          <button class="btn btn--primary" onclick="salvarEditor()"><i class="fa-solid fa-check"></i> Salvar nota</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ MODAL: GERENCIAR CATEGORIAS ============ -->
  <div id="an-modal-tags" class="modal">
    <div class="an-modal-box" style="max-width:420px">
      <div class="an-modal-head">
        <h3><i class="fa-solid fa-tags" style="color:var(--accent)"></i> Categorias</h3>
        <button class="modal__close" onclick="fecharModal('an-modal-tags')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="an-modal-body">
        <div style="background:var(--bg-soft); border:1px solid var(--border); border-radius:12px; padding:14px;">
          <span class="an-label">Nova categoria</span>
          <input type="text" id="an-tag-nome" class="an-input" placeholder="Ex: Livros, Finanças, Ideias..." style="margin-bottom:10px">
          <div style="display:flex; gap:10px; align-items:center;">
            <select id="an-tag-cor" class="an-input" style="flex:1"></select>
            <button class="btn btn--primary" onclick="criarTag()">Criar</button>
          </div>
        </div>
        <div class="an-taglist" id="an-taglist"></div>
      </div>
    </div>
  </div>

  <!-- Modal de backup — IGUAL em todas as páginas -->
  <div id="modal-sync" class="modal">
    <div class="modal__box">
      <div class="modal__head">
        <h3><i class="fa-solid fa-cloud-arrow-up" style="color:var(--accent)"></i> Backup & Transferência</h3>
        <button class="modal__close" onclick="fecharSync()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <p>Sem nuvem por enquanto: use isto pra levar seus dados entre celular e computador.</p>
        <button class="btn" onclick="exportarBackup()" style="width:100%; justify-content:center;">
          <i class="fa-solid fa-download"></i> Exportar (baixar arquivo)
        </button>
        <input type="file" id="input-import" accept=".json" onchange="importarBackup(event)" style="display:none;">
        <button class="btn btn--primary" onclick="document.getElementById('input-import').click()" style="width:100%; justify-content:center;">
          <i class="fa-solid fa-upload"></i> Importar (restaurar backup)
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

  <!-- ===================================================================
       SCRIPT SÓ DESTA PÁGINA
       Toda a leitura/gravação passa pelo Notas (que mora no app.js).
       Assim, uma nota criada aqui ou em qualquer outra página vive na
       MESMA gaveta (planner_anotacoes). Zero duplicação.
       =================================================================== -->
  <script>
    /* ----- Leque de cores (nome + hex). Serve pras notas E pras tags. ----- */
    const CORES = [
      { id: "padrao",   nome: "Padrão",   hex: "" },
      { id: "amarelo",  nome: "Amarelo",  hex: "#eab308" },
      { id: "laranja",  nome: "Laranja",  hex: "#f97316" },
      { id: "vermelho", nome: "Vermelho", hex: "#ef4444" },
      { id: "rosa",     nome: "Rosa",     hex: "#ec4899" },
      { id: "roxo",     nome: "Roxo",     hex: "#a855f7" },
      { id: "azul",     nome: "Azul",     hex: "#3b82f6" },
      { id: "verde",    nome: "Verde",    hex: "#10b981" },
      { id: "turquesa", nome: "Turquesa", hex: "#14b8a6" },
    ];
    function hexDaCor(id) { const c = CORES.find((x) => x.id === id); return c ? c.hex : ""; }

    /* ----- Estado da página ----- */
    let bd = { notas: [], tags: [] };
    let filtroTag = "Todas";
    let aba = "ativas";

    /* Rascunho do editor (o que está sendo montado no modal) */
    let editId = null;
    let edTipo = "texto";
    let edCor = "padrao";
    let edImagens = [];
    let edItens = [];

    /* Rascunho do composer rápido */
    let quickCor = "padrao";

    /* ----- Atalhos pro DOM ----- */
    const $ = (id) => document.getElementById(id);

    /* ----- Helpers ----- */
    function escapar(t) {
      return String(t || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function dataBonita(ms) {
      return new Date(ms).toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });
    }

    /* =================================================================
       INÍCIO
       ================================================================= */
    function iniciarAnotacoes() {
      bd = Notas.lerTudo();
      Notas.gravarTudo(bd); // garante que as tags padrão fiquem salvas
      renderFiltros();
      renderQuickCores();
      render();
    }

    /* =================================================================
       RENDER PRINCIPAL
       ================================================================= */
    function render() {
      const busca = ($("an-busca").value || "").toLowerCase();
      const gridA = $("an-grid-ativas");
      const gridB = $("an-grid-arquivo");
      gridA.innerHTML = "";
      gridB.innerHTML = "";

      const ativas = [];
      const arquivadas = [];

      bd.notas.forEach((n) => {
        if (filtroTag !== "Todas" && n.tagId !== filtroTag) return;
        if (busca) {
          const alvo = (n.titulo + " " + (n.conteudo || "") + " " + (n.itens || []).map((i) => i.txt).join(" ")).toLowerCase();
          if (!alvo.includes(busca)) return;
        }
        (n.arquivada ? arquivadas : ativas).push(n);
      });

      // Ativas: fixadas primeiro, depois mais recentes
      ativas.sort((a, b) => (b.fixada - a.fixada) || (b.data - a.data));
      arquivadas.sort((a, b) => b.data - a.data);

      if (ativas.length === 0) {
        gridA.innerHTML = `<div class="an-vazio" style="column-span:all"><i class="fa-regular fa-lightbulb"></i><p>Nenhuma nota por aqui ainda. Comece criando uma acima.</p></div>`;
      } else {
        ativas.forEach((n) => gridA.appendChild(criarCard(n)));
      }

      if (arquivadas.length === 0) {
        gridB.innerHTML = `<div class="an-vazio" style="column-span:all"><i class="fa-solid fa-box-open"></i><p>O arquivo está vazio.</p></div>`;
      } else {
        arquivadas.forEach((n) => gridB.appendChild(criarCard(n)));
      }

      renderMedidor();
    }

    /* ----- Monta um card de nota ----- */
    function criarCard(n) {
      const tag = bd.tags.find((t) => t.id === n.tagId) || { nome: "Sem categoria", cor: "padrao" };
      const corTag = hexDaCor(tag.cor) || "var(--text-muted)";

      const card = document.createElement("div");
      card.className = "an-card" + (n.cor && n.cor !== "padrao" ? " an-card--cor" : "");
      if (n.cor && n.cor !== "padrao") card.style.setProperty("--an-c", hexDaCor(n.cor));

      // Imagem de capa (primeira imagem, estilo Keep)
      let imgHTML = "";
      if (n.imagens && n.imagens.length) {
        imgHTML = `<img class="an-card__img" src="${n.imagens[0]}" alt="anexo da nota">`;
      }

      // Corpo: texto OU checklist
      let corpoHTML = "";
      if (n.tipo === "checklist") {
        const itens = n.itens || [];
        const visiveis = itens.slice(0, 6);
        corpoHTML = `<div class="an-card__check">` + visiveis.map((it, idx) => `
          <div class="an-citem ${it.feito ? "is-feito" : ""}" onclick="toggleItem('${n.id}', ${idx})">
            <i class="fa-${it.feito ? "solid fa-square-check" : "regular fa-square"}"></i>
            <span>${escapar(it.txt)}</span>
          </div>`).join("") +
          (itens.length > 6 ? `<span class="an-mais">+ ${itens.length - 6} item(ns)</span>` : "") +
          `</div>`;
      } else if (n.conteudo) {
        let preview = n.conteudo.length > 360 ? n.conteudo.slice(0, 360) + "..." : n.conteudo;
        corpoHTML = `<div class="an-card__texto">${escapar(preview)}</div>`;
      }

      card.innerHTML = `
        ${n.fixada ? `<div class="an-card__pin"><i class="fa-solid fa-thumbtack"></i></div>` : ""}
        ${imgHTML}
        <div class="an-card__body">
          <span class="an-badge" style="color:${corTag}; background:color-mix(in srgb, ${corTag} 14%, transparent); border-color:color-mix(in srgb, ${corTag} 35%, transparent)">${escapar(tag.nome)}</span>
          ${n.titulo ? `<div class="an-card__titulo">${escapar(n.titulo)}</div>` : ""}
          ${corpoHTML}
        </div>
        <div class="an-card__foot">
          <span class="an-card__data"><i class="fa-regular fa-calendar"></i> ${dataBonita(n.data)}</span>
          <div class="an-actions">
            <button class="an-act ${n.fixada ? "is-on" : ""}" title="Fixar" onclick="fixar('${n.id}')"><i class="fa-solid fa-thumbtack"></i></button>
            <button class="an-act" title="Cor" onclick="abrirPopCor(event,'${n.id}')"><i class="fa-solid fa-palette"></i></button>
            <button class="an-act" title="Compartilhar no WhatsApp" onclick="compartilhar('${n.id}')"><i class="fa-brands fa-whatsapp"></i></button>
            <button class="an-act" title="Editar" onclick="abrirEditor('${n.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="an-act" title="${n.arquivada ? "Desarquivar" : "Arquivar"}" onclick="arquivar('${n.id}')"><i class="fa-solid fa-box-archive"></i></button>
            <button class="an-act an-act--del" title="Excluir" onclick="excluir('${n.id}')"><i class="fa-solid fa-trash-can"></i></button>
          </div>
        </div>`;
      return card;
    }

    /* ----- Filtros por categoria ----- */
    function renderFiltros() {
      const c = $("an-filtros");
      c.innerHTML = "";
      const fazerChip = (id, nome) => {
        const b = document.createElement("button");
        b.className = "an-chip" + (filtroTag === id ? " is-active" : "");
        b.textContent = nome;
        b.onclick = () => { filtroTag = id; renderFiltros(); render(); };
        c.appendChild(b);
      };
      fazerChip("Todas", "Todas");
      bd.tags.forEach((t) => fazerChip(t.id, t.nome));
    }

    /* ----- Medidor de espaço ----- */
    function renderMedidor() {
      const bytes = Store.usoEmBytes();
      const mb = bytes / 1024 / 1024;
      const limite = 5; // ~5 MB é o teto típico do navegador
      const pct = Math.min(100, (mb / limite) * 100);
      $("an-meter-txt").textContent = mb.toFixed(mb < 0.1 ? 2 : 1) + " MB de ~5 MB";
      const fill = $("an-meter-fill");
      fill.style.width = pct + "%";
      fill.classList.toggle("is-cheio", pct > 80);
    }

    /* ----- Abas ----- */
    function mudarAba(a) {
      aba = a;
      $("an-tab-ativas").classList.toggle("is-active", a === "ativas");
      $("an-tab-arquivo").classList.toggle("is-active", a === "arquivo");
      $("an-conteudo-ativas").style.display = a === "ativas" ? "block" : "none";
      $("an-conteudo-arquivo").style.display = a === "arquivo" ? "block" : "none";
    }

    /* =================================================================
       AÇÕES DO CARD
       ================================================================= */
    function fixar(id) { const n = bd.notas.find((x) => x.id === id); if (n) { n.fixada = !n.fixada; Notas.gravarTudo(bd); render(); } }
    function arquivar(id) { const n = bd.notas.find((x) => x.id === id); if (n) { n.arquivada = !n.arquivada; Notas.gravarTudo(bd); render(); } }
    function excluir(id) {
      if (!confirm("Excluir esta nota de vez? Isso não tem volta.")) return;
      bd.notas = bd.notas.filter((x) => x.id !== id);
      Notas.gravarTudo(bd); render();
    }
    function toggleItem(id, idx) {
      const n = bd.notas.find((x) => x.id === id);
      if (n && n.itens && n.itens[idx]) { n.itens[idx].feito = !n.itens[idx].feito; Notas.gravarTudo(bd); render(); }
    }

    /* ----- Popover de cor (a partir do card) ----- */
    function abrirPopCor(ev, id) {
      ev.stopPropagation();
      const pop = $("an-pop-cor");
      pop.dataset.alvo = id;
      const r = ev.currentTarget.getBoundingClientRect();
      let left = r.left;
      if (left + 190 > window.innerWidth) left = window.innerWidth - 200;
      pop.style.top = (r.bottom + 8) + "px";
      pop.style.left = Math.max(10, left) + "px";
      renderCoresEm("an-pop-cores", () => {
        const n = bd.notas.find((x) => x.id === id); return n ? n.cor : "padrao";
      }, (c) => {
        const n = bd.notas.find((x) => x.id === id);
        if (n) { n.cor = c; Notas.gravarTudo(bd); render(); }
        fecharPopCor();
      });
      pop.classList.add("is-open");
    }
    function fecharPopCor() { $("an-pop-cor").classList.remove("is-open"); }
    document.addEventListener("click", (e) => {
      const pop = $("an-pop-cor");
      if (pop.classList.contains("is-open") && !pop.contains(e.target)) fecharPopCor();
    });

    /* ----- Compartilhar (Web Share com imagem; cai pro WhatsApp texto) ----- */
    function textoParaCompartilhar(n) {
      let txt = n.titulo ? (n.titulo + "\n\n") : "";
      if (n.tipo === "checklist") {
        txt += (n.itens || []).map((i) => (i.feito ? "☑ " : "☐ ") + i.txt).join("\n");
      } else {
        txt += n.conteudo || "";
      }
      return txt.trim();
    }
    function dataURLparaArquivo(dataURL, nome) {
      try {
        const [cab, b64] = dataURL.split(",");
        const mime = (cab.match(/data:(.*?);/) || [, "image/jpeg"])[1];
        const bin = atob(b64);
        const u8 = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
        return new File([u8], nome, { type: mime });
      } catch { return null; }
    }
    async function compartilhar(id) {
      const n = bd.notas.find((x) => x.id === id);
      if (!n) return;
      const texto = textoParaCompartilhar(n);
      try {
        if (navigator.share) {
          const dados = { text: texto };
          if (n.imagens && n.imagens.length && navigator.canShare) {
            const f = dataURLparaArquivo(n.imagens[0], "nota.jpg");
            if (f && navigator.canShare({ files: [f] })) dados.files = [f];
          }
          await navigator.share(dados);
          return;
        }
      } catch (e) {
        if (e && e.name === "AbortError") return; // o usuário fechou o menu de compartilhar
      }
      // Sem Web Share (ex: no PC): abre o WhatsApp Web só com o texto
      window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
    }

    /* =================================================================
       COMPOSER RÁPIDO
       ================================================================= */
    function abrirQuick() {
      $("an-quick").classList.add("is-open");
      renderQuickCores();
      setTimeout(() => $("an-quick-titulo").focus(), 50);
    }
    function fecharQuick() {
      $("an-quick").classList.remove("is-open");
      $("an-quick-titulo").value = "";
      $("an-quick-corpo").value = "";
      $("an-quick-trigger").value = "";
      quickCor = "padrao";
    }
    function salvarQuick() {
      const titulo = $("an-quick-titulo").value.trim();
      const conteudo = $("an-quick-corpo").value.trim();
      if (!titulo && !conteudo) { fecharQuick(); return; }
      const nova = Notas.novaNota({
        titulo, conteudo, tagId: filtroTag !== "Todas" ? filtroTag : bd.tags[0].id,
        cor: quickCor, origem: "anotacoes",
      });
      bd.notas.unshift(nova);
      Notas.gravarTudo(bd);
      fecharQuick();
      render();
    }
    // Leva o que já foi digitado no quick pro editor completo (lista ou imagem)
    function quickParaEditor(modo) {
      const titulo = $("an-quick-titulo").value.trim();
      const conteudo = $("an-quick-corpo").value.trim();
      fecharQuick();
      abrirEditor(null, { titulo, conteudo, tipo: modo === "checklist" ? "checklist" : "texto", abrirImagem: modo === "imagem" });
    }

    /* =================================================================
       EDITOR COMPLETO (modal)
       ================================================================= */
    function abrirEditor(id = null, preset = null) {
      editId = id;
      edImagens = [];
      edItens = [];
      edTipo = "texto";
      edCor = "padrao";

      $("an-ed-tag").innerHTML = bd.tags.map((t) => `<option value="${t.id}">${escapar(t.nome)}</option>`).join("");

      if (id) {
        const n = bd.notas.find((x) => x.id === id);
        $("an-modal-titulo").textContent = "Editar nota";
        $("an-ed-titulo").value = n.titulo || "";
        edTipo = n.tipo || "texto";
        edCor = n.cor || "padrao";
        edImagens = (n.imagens || []).slice();
        if (edTipo === "checklist") edItens = (n.itens || []).map((i) => ({ ...i }));
        else $("an-ed-corpo").value = n.conteudo || "";
        $("an-ed-tag").value = n.tagId;
        $("an-ed-excluir").style.display = "inline-flex";
      } else {
        $("an-modal-titulo").textContent = "Nova nota";
        $("an-ed-titulo").value = preset?.titulo || "";
        $("an-ed-corpo").value = preset?.conteudo || "";
        edTipo = preset?.tipo || "texto";
        if (edTipo === "checklist" && preset?.conteudo) {
          // transforma cada linha do texto colado em um item
          edItens = preset.conteudo.split("\n").filter((l) => l.trim()).map((l) => ({ txt: l.trim(), feito: false }));
          $("an-ed-corpo").value = "";
        }
        $("an-ed-tag").value = filtroTag !== "Todas" ? filtroTag : bd.tags[0].id;
        $("an-ed-excluir").style.display = "none";
      }

      aplicarTipoEditor();
      renderItensEditor();
      renderEdCores();
      renderThumbs();
      abrirModal("an-modal-nota");
      setTimeout(() => { $("an-ed-titulo").focus(); if (preset?.abrirImagem) $("an-ed-file").click(); }, 60);
    }

    function mudarTipoEditor(tipo) { edTipo = tipo; aplicarTipoEditor(); }
    function aplicarTipoEditor() {
      const t = edTipo === "checklist";
      $("an-type-texto").classList.toggle("is-active", !t);
      $("an-type-checklist").classList.toggle("is-active", t);
      $("an-bloco-texto").style.display = t ? "none" : "block";
      $("an-bloco-checklist").style.display = t ? "block" : "none";
      if (t && edItens.length === 0) { edItens.push({ txt: "", feito: false }); renderItensEditor(); }
    }

    function renderItensEditor() {
      const c = $("an-ed-itens");
      c.innerHTML = "";
      edItens.forEach((it, idx) => {
        const row = document.createElement("div");
        row.className = "an-item-edit";
        row.innerHTML = `
          <i class="fa-regular fa-square" style="color:var(--text-muted)"></i>
          <input type="text" value="${escapar(it.txt)}" placeholder="Item da lista...">
          <button title="Remover"><i class="fa-solid fa-xmark"></i></button>`;
        const input = row.querySelector("input");
        input.oninput = (e) => { edItens[idx].txt = e.target.value; };
        input.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); addItem(); } };
        row.querySelector("button").onclick = () => { edItens.splice(idx, 1); renderItensEditor(); };
        c.appendChild(row);
      });
    }
    function addItem() {
      edItens.push({ txt: "", feito: false });
      renderItensEditor();
      const inputs = $("an-ed-itens").querySelectorAll("input");
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    /* ----- Imagens: comprime antes de salvar e respeita o limite ----- */
    function comprimirImagem(file, maxLado = 1000, qualidade = 0.7) {
      return new Promise((resolve, reject) => {
        const leitor = new FileReader();
        leitor.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > height && width > maxLado) { height = Math.round(height * maxLado / width); width = maxLado; }
            else if (height >= width && height > maxLado) { width = Math.round(width * maxLado / height); height = maxLado; }
            const canvas = document.createElement("canvas");
            canvas.width = width; canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", qualidade));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        leitor.onerror = reject;
        leitor.readAsDataURL(file);
      });
    }
    async function anexarImagens(ev) {
      const arquivos = Array.from(ev.target.files || []);
      ev.target.value = "";
      for (const f of arquivos) {
        if (!f.type.startsWith("image/")) continue;
        try {
          const dataURL = await comprimirImagem(f);
          // teto de segurança: ~4,5 MB pro Planner inteiro (deixa folga até os 5)
          if (Store.usoEmBytes() + dataURL.length > 4.5 * 1024 * 1024) {
            alert("Espaço quase no limite (~5 MB). Apague imagens ou notas antigas antes de adicionar mais.");
            break;
          }
          edImagens.push(dataURL);
        } catch { alert("Não consegui processar essa imagem."); }
      }
      renderThumbs();
    }
    function renderThumbs() {
      const c = $("an-ed-thumbs");
      c.innerHTML = "";
      edImagens.forEach((src, idx) => {
        const d = document.createElement("div");
        d.className = "an-thumb";
        d.innerHTML = `<img src="${src}" alt=""><button title="Remover"><i class="fa-solid fa-xmark"></i></button>`;
        d.querySelector("button").onclick = () => { edImagens.splice(idx, 1); renderThumbs(); };
        c.appendChild(d);
      });
    }

    function salvarEditor() {
      const titulo = $("an-ed-titulo").value.trim();
      let conteudo = "", itens = [];
      if (edTipo === "checklist") {
        itens = edItens.filter((i) => i.txt.trim()).map((i) => ({ txt: i.txt.trim(), feito: !!i.feito }));
        if (!titulo && itens.length === 0 && edImagens.length === 0) { alert("Escreva um título, itens ou anexe uma imagem."); return; }
      } else {
        conteudo = $("an-ed-corpo").value.trim();
        if (!titulo && !conteudo && edImagens.length === 0) { alert("Escreva algo ou anexe uma imagem antes de salvar."); return; }
      }
      const tagId = $("an-ed-tag").value;

      if (editId) {
        const n = bd.notas.find((x) => x.id === editId);
        Object.assign(n, { titulo, conteudo, tipo: edTipo, itens, tagId, cor: edCor, imagens: edImagens.slice() });
      } else {
        const nova = Notas.novaNota({ titulo, conteudo, tipo: edTipo, itens, tagId, cor: edCor, imagens: edImagens.slice(), origem: "anotacoes" });
        bd.notas.unshift(nova);
      }
      Notas.gravarTudo(bd);
      fecharModal("an-modal-nota");
      render();
    }
    function excluirDoEditor() {
      if (!editId) return;
      if (!confirm("Excluir esta nota de vez? Isso não tem volta.")) return;
      bd.notas = bd.notas.filter((x) => x.id !== editId);
      Notas.gravarTudo(bd);
      fecharModal("an-modal-nota");
      render();
    }

    /* =================================================================
       LEQUE DE CORES (reutilizável: editor, quick e popover)
       getter() devolve a cor atual; onPick(cor) é chamado ao escolher.
       ================================================================= */
    function renderCoresEm(containerId, getter, onPick) {
      const c = $(containerId);
      if (!c) return;
      const atual = getter();
      c.innerHTML = "";
      CORES.forEach((cor) => {
        const b = document.createElement("button");
        b.className = "an-cor" + (cor.id === "padrao" ? " an-cor--padrao" : "") + (cor.id === atual ? " is-sel" : "");
        if (cor.hex) b.style.background = "color-mix(in srgb, " + cor.hex + " 30%, var(--panel))";
        b.title = cor.nome;
        b.onclick = () => { onPick(cor.id); };
        c.appendChild(b);
      });
    }
    // Atalhos que já sabem qual cor controlar e se redesenham ao escolher
    function renderQuickCores() {
      renderCoresEm("an-quick-cores", () => quickCor, (c) => { quickCor = c; renderQuickCores(); });
    }
    function renderEdCores() {
      renderCoresEm("an-ed-cores", () => edCor, (c) => { edCor = c; renderEdCores(); });
    }

    /* =================================================================
       GERENCIAR CATEGORIAS
       ================================================================= */
    function abrirTags() {
      // popular o seletor de cor (sem o "padrão")
      $("an-tag-cor").innerHTML = CORES.filter((c) => c.id !== "padrao")
        .map((c) => `<option value="${c.id}">${c.nome}</option>`).join("");
      renderTags();
      abrirModal("an-modal-tags");
    }
    function renderTags() {
      const c = $("an-taglist");
      c.innerHTML = "";
      bd.tags.forEach((t) => {
        const hex = hexDaCor(t.cor) || "var(--text-muted)";
        const row = document.createElement("div");
        row.className = "an-tagrow";
        row.innerHTML = `
          <span class="an-badge" style="margin:0; color:${hex}; background:color-mix(in srgb, ${hex} 14%, transparent); border-color:color-mix(in srgb, ${hex} 35%, transparent)">${escapar(t.nome)}</span>
          <div style="display:flex; gap:6px;">
            <button class="an-act" title="Renomear"><i class="fa-solid fa-pen"></i></button>
            <button class="an-act an-act--del" title="Excluir"><i class="fa-solid fa-trash-can"></i></button>
          </div>`;
        const [btnEditar, btnExcluir] = row.querySelectorAll("button");
        btnEditar.onclick = () => editarTag(t.id);
        btnExcluir.onclick = () => excluirTag(t.id);
        c.appendChild(row);
      });
    }
    function criarTag() {
      const nome = $("an-tag-nome").value.trim();
      const cor = $("an-tag-cor").value;
      if (!nome) return;
      bd.tags.push({ id: "tag_" + Date.now(), nome, cor });
      Notas.gravarTudo(bd);
      $("an-tag-nome").value = "";
      renderTags(); renderFiltros();
    }
    function editarTag(id) {
      const t = bd.tags.find((x) => x.id === id);
      const novo = prompt("Novo nome da categoria:", t.nome);
      if (novo && novo.trim()) { t.nome = novo.trim(); Notas.gravarTudo(bd); renderTags(); renderFiltros(); render(); }
    }
    function excluirTag(id) {
      if (bd.notas.some((n) => n.tagId === id)) { alert("Não dá pra excluir: existem notas nesta categoria. Mude-as de categoria primeiro."); return; }
      if (bd.tags.length <= 1) { alert("Você precisa de pelo menos uma categoria."); return; }
      if (!confirm("Excluir esta categoria?")) return;
      bd.tags = bd.tags.filter((x) => x.id !== id);
      if (filtroTag === id) filtroTag = "Todas";
      Notas.gravarTudo(bd);
      renderTags(); renderFiltros(); render();
    }

    /* =================================================================
       MODAIS (genérico)
       ================================================================= */
    function abrirModal(id) { $(id).classList.add("is-open"); }
    function fecharModal(id) { $(id).classList.remove("is-open"); }

    /* ----- Liga tudo quando a página carrega ----- */
    document.addEventListener("DOMContentLoaded", iniciarAnotacoes);
  </script>
</body>
</html>
