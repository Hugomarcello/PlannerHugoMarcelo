<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner Hugo Marcelo | Autocuidado</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- ===================================================================
       ESTILOS SÓ DESTA PÁGINA  (prefixo "ac-" pra não colidir)
       Filosofia visual: painel de controle. Poucas cores, e a cor só
       aparece quando CARREGA SIGNIFICADO (status): vermelho = atrasado,
       âmbar = atenção, verde = em dia, cinza = neutro.
       =================================================================== -->
  <style>
    /* ---------- DASHBOARD ---------- */
    .ac-dash { margin-bottom:20px; }
    .ac-dash__top { display:flex; gap:22px; align-items:center; flex-wrap:wrap; }

    /* Anel de score: um círculo "preenchido" por gradiente cônico.
       --p = porcentagem (0–100) e --cor = a cor conforme o score. */
    .ring {
      position:relative; width:108px; height:108px; border-radius:50%; flex-shrink:0;
      background: conic-gradient(var(--cor, var(--accent)) calc(var(--p,0) * 3.6deg), var(--border) 0);
    }
    .ring__hole { position:absolute; inset:10px; border-radius:50%; background:var(--panel); display:grid; place-items:center; text-align:center; }
    .ring__num { font-size:26px; font-weight:900; line-height:1; }
    .ring__lbl { font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-top:4px; }

    .ac-tiles { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; flex:1; min-width:240px; }
    .ac-tile { background:var(--bg-soft); border:1px solid var(--border); border-radius:12px; padding:13px 14px; }
    .ac-tile__num { font-size:21px; font-weight:900; line-height:1; }
    .ac-tile__lbl { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-top:5px; }
    .ac-tile__hint { font-size:12px; font-weight:800; color:var(--text-strong); margin-top:5px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; }

    /* Score por categoria (mini-barras) */
    .ac-catscores { margin-top:18px; padding-top:16px; border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; gap:12px 26px; }
    .ac-catscore { display:grid; grid-template-columns:1fr auto; align-items:center; gap:5px 10px; }
    .ac-catscore__nome { font-size:11px; font-weight:700; color:var(--text-muted); display:flex; align-items:center; gap:7px; min-width:0; }
    .ac-catscore__nome i { width:14px; text-align:center; }
    .ac-catscore__pct { font-size:11px; font-weight:900; }
    .ac-csbar { grid-column:1 / -1; height:6px; border-radius:99px; background:var(--bg-soft); overflow:hidden; }
    .ac-csbar i { display:block; height:100%; border-radius:99px; transition:width .3s; }

    /* ---------- BARRA: alternar visão + ações ---------- */
    .ac-bar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .ac-views { display:inline-flex; background:var(--bg-soft); border:1px solid var(--border); border-radius:10px; padding:3px; gap:3px; }
    .ac-view { padding:8px 14px; border-radius:8px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); display:inline-flex; align-items:center; gap:7px; transition:all .15s; }
    .ac-view.is-active { background:var(--accent); color:#fff; box-shadow:var(--glow); }
    .ac-bar__acoes { display:flex; flex-wrap:wrap; gap:8px; }

    /* Filtros de categoria (só na visão Por categoria) */
    .ac-filtros { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .ac-chip { padding:7px 12px; border-radius:99px; background:var(--bg-soft); border:1px solid var(--border); font-size:11px; font-weight:700; color:var(--text-muted); display:inline-flex; align-items:center; gap:7px; transition:all .15s; }
    .ac-chip.is-active { color:var(--text-strong); border-color:var(--accent); }

    /* ---------- LINHA DE CUIDADO ---------- */
    .ac-grupo-tit { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:12px; }
    .ac-row { display:flex; align-items:center; gap:12px; padding:11px 12px; background:var(--bg-soft); border:1px solid var(--border); border-radius:11px; margin-bottom:8px; flex-wrap:wrap; }
    .ac-row__main { flex:1; min-width:160px; }
    .ac-row__nome { font-size:13px; font-weight:700; color:var(--text-strong); line-height:1.3; }
    .ac-row__meta { font-size:10px; font-weight:700; color:var(--text-muted); margin-top:5px; display:flex; flex-wrap:wrap; gap:4px 10px; align-items:center; }
    .ac-row__meta i { margin-right:3px; }
    .ac-row__dir { display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }

    /* Bolinha de prioridade */
    .prio { width:9px; height:9px; border-radius:99px; flex-shrink:0; display:inline-block; }
    .prio--alta { background:#ef4444; }
    .prio--media { background:#f59e0b; }
    .prio--baixa { background:var(--text-muted); opacity:.45; }

    /* Etiqueta de status */
    .st { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; padding:4px 9px; border-radius:7px; white-space:nowrap; }
    .st--atrasado { background:rgba(239,68,68,.14); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
    .st--hoje     { background:rgba(245,158,11,.15); color:#f59e0b; border:1px solid rgba(245,158,11,.3); }
    .st--proximo  { background:var(--bg-soft); color:var(--text-muted); border:1px solid var(--border); }
    .st--emdia    { background:var(--accent-soft); color:var(--accent); border:1px solid transparent; }
    .st--pendente { background:var(--bg-soft); color:var(--text-muted); border:1px dashed var(--border); }
    .st--livre    { background:var(--bg-soft); color:var(--text-muted); border:1px solid var(--border); }

    /* Botão "Feito" */
    .ac-feito { display:inline-flex; align-items:center; gap:6px; padding:7px 11px; border-radius:8px; background:var(--accent); color:#fff; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; transition:filter .15s; }
    .ac-feito:hover { filter:brightness(1.1); }
    .ac-feito--done { background:var(--bg-soft); color:var(--text-muted); border:1px solid var(--border); }

    /* Botõezinhos de ação */
    .mini { width:30px; height:30px; border-radius:8px; background:var(--panel); border:1px solid var(--border); color:var(--text-muted); display:grid; place-items:center; font-size:11px; transition:all .15s; flex-shrink:0; }
    .mini:hover { color:var(--text-strong); border-color:var(--accent); }
    .mini--perigo:hover { color:#ef4444; border-color:#ef4444; }

    .badge { display:inline-block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.8px; padding:4px 9px; border-radius:7px; background:var(--panel); border:1px solid var(--border); color:var(--text-muted); }

    /* ---------- CARD DE CATEGORIA (visão Por categoria) ---------- */
    .ac-catcard { background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:var(--shadow); margin-bottom:16px; }
    .ac-catcard__head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .ac-catcard__icone { width:40px; height:40px; border-radius:11px; background:var(--bg-soft); border:1px solid var(--border); display:grid; place-items:center; color:var(--text-muted); font-size:16px; flex-shrink:0; }
    .ac-catcard__nome { font-size:14px; font-weight:800; line-height:1.2; }
    .ac-catcard__count { font-size:10px; color:var(--text-muted); font-weight:700; margin-top:3px; }
    .ac-add { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); background:var(--accent-soft); padding:7px 11px; border-radius:8px; flex-shrink:0; transition:filter .15s; }
    .ac-add:hover { filter:brightness(1.12); }
    .ac-subtit { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin:16px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

    /* Estados vazios */
    .ac-vazio-mini { font-size:11px; font-weight:600; font-style:italic; color:var(--text-muted); padding:6px 2px; }
    .ac-tudoemdia { text-align:center; padding:54px 20px; }
    .ac-tudoemdia i { font-size:46px; color:var(--accent); margin-bottom:16px; }
    .ac-tudoemdia h3 { font-size:16px; font-weight:800; }
    .ac-tudoemdia p { font-size:12px; color:var(--text-muted); margin-top:8px; max-width:380px; margin-inline:auto; line-height:1.5; }

    /* ---------- CAMPOS DOS MODAIS ---------- */
    .campo { margin-bottom:16px; }
    .campo__label { display:flex; justify-content:space-between; align-items:center; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:8px; }
    .campo__input, .campo__select, .campo__area {
      width:100%; background:var(--bg-soft); border:1px solid var(--border); border-radius:10px; padding:12px;
      color:var(--text-strong); font-family:inherit; font-size:13px; font-weight:600; outline:none; transition:border-color .15s;
    }
    .campo__input:focus, .campo__select:focus, .campo__area:focus { border-color:var(--accent); }
    .campo__area { resize:vertical; min-height:74px; }
    .campo--dupla { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    /* Seletores nativos (data) acompanham o tema */
    :root[data-theme="dark"]  .campo__input, :root[data-theme="dark"]  .campo__select { color-scheme:dark; }
    :root[data-theme="light"] .campo__input, :root[data-theme="light"] .campo__select { color-scheme:light; }

    .ac-modal-rodape { flex-direction:row !important; justify-content:flex-end; gap:10px; border-top:1px solid var(--border); }

    /* Bloco de info (só leitura) no topo da edição */
    .ac-info { background:var(--bg-soft); border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin-bottom:16px; display:flex; gap:20px; flex-wrap:wrap; align-items:center; }
    .ac-info__item span { display:block; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); font-weight:800; margin-bottom:4px; }
    .ac-info__item { font-size:12px; font-weight:700; }

    /* Linhas de "Gerenciar categorias" / "Arquivados" / "Histórico" */
    .ac-linha { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 12px; background:var(--bg-soft); border:1px solid var(--border); border-radius:11px; margin-bottom:8px; }
    .ac-linha__id { display:flex; align-items:center; gap:11px; min-width:0; }
    .ac-linha__nome { font-size:12px; font-weight:800; color:var(--text-strong); }
    .ac-linha__meta { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); margin-top:3px; }
    .ac-mini-icone { width:34px; height:34px; border-radius:9px; display:grid; place-items:center; font-size:14px; flex-shrink:0; background:var(--panel); border:1px solid var(--border); color:var(--text-muted); }
    .ac-risco { text-decoration:line-through; opacity:.55; }
    .ac-cofre-tit { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

    /* Gerenciador de subcategorias (dentro de editar categoria) */
    .ac-subadd { display:flex; gap:8px; }
    .ac-subadd .campo__input { flex:1; }
    .ac-subchips { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .ac-subchip { display:inline-flex; align-items:center; gap:8px; padding:6px 11px; border-radius:99px; background:var(--bg-soft); border:1px solid var(--border); font-size:11px; font-weight:700; }
    .ac-subchip button { color:var(--text-muted); font-size:11px; }
    .ac-subchip button:hover { color:#ef4444; }

    .modal__box--scroll { max-height:90dvh; overflow-y:auto; }
    .ac-confirma-msg { font-size:14px; font-weight:600; color:var(--text-strong); line-height:1.5; }

    /* Aviso flutuante (substitui o alert) */
    .ac-toast { position:fixed; bottom:20px; right:20px; z-index:200; display:flex; align-items:center; gap:9px; background:var(--panel); border:1px solid var(--border); color:var(--text-strong); padding:12px 16px; border-radius:12px; font-size:12px; font-weight:700; box-shadow:var(--shadow); max-width:calc(100vw - 40px); transform:translateY(140%); opacity:0; transition:transform .3s ease, opacity .3s ease; }
    .ac-toast.is-open { transform:translateY(0); opacity:1; }
    .ac-toast i { color:var(--accent); }

    /* ---------- CELULAR ---------- */
    @media (max-width:640px) {
      .ac-tiles { grid-template-columns:1fr 1fr; }
      .ac-tiles .ac-tile:last-child { grid-column:1 / -1; }
      .ac-catscores { grid-template-columns:1fr; gap:10px; }
      .ac-views { width:100%; }
      .ac-view { flex:1; justify-content:center; }
      .ac-bar__acoes { width:100%; }
      .ac-bar__acoes .btn { flex:1; justify-content:center; }
      .ac-filtros { flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; padding-bottom:4px; }
      .ac-filtros::-webkit-scrollbar { display:none; }
      .ac-chip { flex-shrink:0; }
      .mini { width:32px; height:32px; font-size:12px; }
      .campo--dupla { grid-template-columns:1fr; }
    }
  </style>
</head>

<body class="app" data-page="autocuidado">

  <div id="sidebar-container"></div>
  <div id="overlay" class="overlay" onclick="fecharMenu()"></div>

  <main class="main">

    <header class="header">
      <div class="header__left">
        <button class="btn btn--icon btn--menu" onclick="abrirMenu()" aria-label="Abrir menu">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div>
          <h1 class="header__title">Autocuidado</h1>
          <p class="header__subtitle">Manutenção Preventiva da Sua Melhor Versão</p>
        </div>
      </div>
      <div class="header__actions">
        <button class="btn" onclick="abrirSync()">
          <i class="fa-solid fa-cloud-arrow-up" style="color: var(--accent)"></i>
          <span>Backup</span>
        </button>
        <button class="btn btn--icon" id="btn-tema" onclick="Tema.alternar()" aria-label="Trocar tema">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <div class="container fade-up">

      <!-- Dashboard (montado pelo JS) -->
      <div id="ac-dash"></div>

      <!-- Barra de visão + ações -->
      <div class="ac-bar">
        <div class="ac-views">
          <button id="vw-hoje" class="ac-view" onclick="setVista('hoje')"><i class="fa-solid fa-bolt"></i> Hoje</button>
          <button id="vw-cat" class="ac-view" onclick="setVista('cat')"><i class="fa-solid fa-layer-group"></i> Por categoria</button>
        </div>
        <div class="ac-bar__acoes">
          <button class="btn btn--primary" onclick="abrirNovoCuidado()"><i class="fa-solid fa-plus"></i> Novo cuidado</button>
          <button class="btn" onclick="abrirCats()"><i class="fa-solid fa-list"></i> Categorias</button>
          <button class="btn" onclick="abrirCofre()"><i class="fa-solid fa-box-archive"></i> Arquivados</button>
        </div>
      </div>

      <!-- Filtros de categoria (só na visão Por categoria) -->
      <div class="ac-filtros" id="ac-filtros"></div>

      <!-- Conteúdo (Hoje OU Por categoria) -->
      <div id="ac-conteudo"></div>

    </div>

    <div id="footer-container"></div>
  </main>

  <!-- ====== MODAL DE BACKUP (igual em todas as páginas) ====== -->
  <div id="modal-sync" class="modal">
    <div class="modal__box">
      <div class="modal__head">
        <h3><i class="fa-solid fa-cloud-arrow-up" style="color:var(--accent)"></i> Backup & Transferência</h3>
        <button class="modal__close" onclick="fecharSync()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <p>Sem nuvem por enquanto: use isto pra levar seus dados entre celular e computador.</p>
        <button class="btn" onclick="exportarBackup()" style="width:100%; justify-content:center;">
          <i class="fa-solid fa-download"></i> Exportar (baixar arquivo)
        </button>
        <input type="file" id="input-import" accept=".json" onchange="importarBackup(event)" style="display:none;">
        <button class="btn btn--primary" onclick="document.getElementById('input-import').click()" style="width:100%; justify-content:center;">
          <i class="fa-solid fa-upload"></i> Importar (restaurar backup)
        </button>
      </div>
    </div>
  </div>

  <!-- ====== MODAL: NOVO / EDITAR CUIDADO ====== -->
  <div id="modal-cuidado" class="modal" onclick="fundoModal(event,'modal-cuidado')">
    <div class="modal__box modal__box--scroll">
      <div class="modal__head">
        <h3 id="ac-c-titulo"><i class="fa-solid fa-plus" style="color:var(--accent)"></i> Novo cuidado</h3>
        <button class="modal__close" onclick="fechar('modal-cuidado')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <input type="hidden" id="ac-c-id">

        <div class="ac-info" id="ac-c-info" style="display:none"></div>

        <div class="campo">
          <label class="campo__label">Nome do cuidado</label>
          <input id="ac-c-nome" class="campo__input" placeholder="Ex: Hidratar o rosto" maxlength="120">
        </div>

        <div class="campo--dupla">
          <div class="campo">
            <label class="campo__label">Categoria</label>
            <select id="ac-c-cat" class="campo__select" onchange="onCatChange()"></select>
          </div>
          <div class="campo" id="ac-c-sub-campo">
            <label class="campo__label">Subcategoria</label>
            <select id="ac-c-sub" class="campo__select"></select>
          </div>
        </div>

        <div class="campo--dupla">
          <div class="campo">
            <label class="campo__label">Frequência</label>
            <select id="ac-c-freq" class="campo__select"></select>
          </div>
          <div class="campo">
            <label class="campo__label">Prioridade</label>
            <select id="ac-c-prio" class="campo__select">
              <option value="alta">Alta</option>
              <option value="media" selected>Média</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>

        <div class="campo--dupla">
          <div class="campo">
            <label class="campo__label">Tempo estimado (min)</label>
            <input id="ac-c-tempo" class="campo__input" type="number" min="0" placeholder="Ex: 5">
          </div>
          <div class="campo">
            <label class="campo__label">Última execução</label>
            <input id="ac-c-ultima" class="campo__input" type="date">
          </div>
        </div>

        <div class="campo">
          <label class="campo__label">Observações <span style="font-weight:600;text-transform:none;letter-spacing:0">(opcional)</span></label>
          <textarea id="ac-c-obs" class="campo__area" placeholder="Marca do produto, técnica, lembrete..."></textarea>
        </div>
      </div>
      <div class="modal__body ac-modal-rodape">
        <button class="btn" onclick="fechar('modal-cuidado')">Cancelar</button>
        <button class="btn btn--primary" onclick="salvarCuidado()"><i class="fa-solid fa-check"></i> Salvar</button>
      </div>
    </div>
  </div>

  <!-- ====== MODAL: GERENCIAR CATEGORIAS ====== -->
  <div id="modal-cats" class="modal" onclick="fundoModal(event,'modal-cats')">
    <div class="modal__box modal__box--scroll">
      <div class="modal__head">
        <h3><i class="fa-solid fa-list" style="color:var(--accent)"></i> Categorias</h3>
        <button class="modal__close" onclick="fechar('modal-cats')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <button class="btn btn--primary" style="width:100%; justify-content:center;" onclick="abrirNovaCat()">
          <i class="fa-solid fa-plus"></i> Nova categoria
        </button>
        <div id="ac-lista-cats"></div>
      </div>
    </div>
  </div>

  <!-- ====== MODAL: NOVA / EDITAR CATEGORIA ====== -->
  <div id="modal-catedit" class="modal" onclick="fundoModal(event,'modal-catedit')">
    <div class="modal__box modal__box--scroll">
      <div class="modal__head">
        <h3 id="ac-cat-titulo"><i class="fa-solid fa-layer-group" style="color:var(--accent)"></i> Nova categoria</h3>
        <button class="modal__close" onclick="fechar('modal-catedit')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <input type="hidden" id="ac-cat-id">
        <div class="campo">
          <label class="campo__label">Nome</label>
          <input id="ac-cat-nome" class="campo__input" placeholder="Ex: Pele" maxlength="40">
        </div>
        <div class="campo">
          <label class="campo__label">Ícone</label>
          <select id="ac-cat-icone" class="campo__select"></select>
        </div>
        <div class="campo">
          <label class="campo__label">Subcategorias <span style="font-weight:600;text-transform:none;letter-spacing:0">(opcional)</span></label>
          <div class="ac-subadd">
            <input id="ac-cat-subinput" class="campo__input" placeholder="Ex: Rosto" maxlength="30" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubEdit();}">
            <button class="btn" onclick="addSubEdit()"><i class="fa-solid fa-plus"></i></button>
          </div>
          <div class="ac-subchips" id="ac-cat-subs"></div>
        </div>
      </div>
      <div class="modal__body ac-modal-rodape">
        <button class="btn" onclick="fechar('modal-catedit')">Cancelar</button>
        <button class="btn btn--primary" onclick="salvarCat()"><i class="fa-solid fa-check"></i> Salvar</button>
      </div>
    </div>
  </div>

  <!-- ====== MODAL: HISTÓRICO DE EXECUÇÃO ====== -->
  <div id="modal-historico" class="modal" onclick="fundoModal(event,'modal-historico')">
    <div class="modal__box modal__box--scroll">
      <div class="modal__head">
        <h3><i class="fa-solid fa-clock-rotate-left" style="color:var(--accent)"></i> <span id="ac-hist-titulo">Histórico</span></h3>
        <button class="modal__close" onclick="fechar('modal-historico')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <div id="ac-hist-lista"></div>
      </div>
    </div>
  </div>

  <!-- ====== MODAL: ARQUIVADOS ====== -->
  <div id="modal-cofre" class="modal" onclick="fundoModal(event,'modal-cofre')">
    <div class="modal__box modal__box--scroll">
      <div class="modal__head">
        <h3><i class="fa-solid fa-box-archive" style="color:var(--accent)"></i> Cofre de autocuidado</h3>
        <button class="modal__close" onclick="fechar('modal-cofre')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <div id="ac-lista-cofre"></div>

  <!-- ====== MODAL: CONFIRMAÇÃO (substitui o confirm) ====== -->
  <div id="modal-confirma" class="modal" onclick="fundoModal(event,'modal-confirma')">
    <div class="modal__box">
      <div class="modal__head">
        <h3><i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i> Confirmar</h3>
        <button class="modal__close" onclick="cancelarConfirma()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal__body">
        <p class="ac-confirma-msg" id="ac-confirma-msg"></p>
      </div>
      <div class="modal__body ac-modal-rodape">
        <button class="btn" onclick="cancelarConfirma()">Cancelar</button>
        <button class="btn btn--primary" style="background:#ef4444; border-color:#ef4444;" onclick="confirmarAcao()">
          <i class="fa-solid fa-check"></i> Confirmar
        </button>
      </div>
    </div>
  </div>

  <div id="ac-toast" class="ac-toast"></div>

  <script src="app.js"></script>
  <script>
    /* =================================================================
       AUTOCUIDADO — painel de manutenção preventiva
       O app.js já cuidou da sidebar, do tema e do backup. Aqui mora só
       a inteligência do autocuidado: catálogo, motor de datas e score.
       ================================================================= */

    const CHAVE = "autocuidado";   /* vira planner_autocuidado no Store */

    /* -----------------------------------------------------------------
       MOTOR DE DATAS — tudo em data LOCAL (nunca toISOString!)
       Esse é o ponto onde mais aparece o bug de fuso UTC-3 (um dia a
       mais ou a menos). Por isso montamos as datas "na mão", lendo
       ano/mês/dia locais, e guardamos como texto "AAAA-MM-DD".
       ----------------------------------------------------------------- */
    function pad(n) { return String(n).padStart(2, "0"); }

    /* Data de hoje como "AAAA-MM-DD", usando o relógio local do aparelho. */
    function hojeStr() {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    /* Transforma "AAAA-MM-DD" num Date à meia-noite LOCAL (sem fuso). */
    function dataLocal(str) {
      const [a, m, d] = str.split("-").map(Number);
      return new Date(a, m - 1, d);
    }

    /* Soma "dias" a uma data e devolve outra string "AAAA-MM-DD". */
    function somarDias(str, dias) {
      const dt = dataLocal(str);
      dt.setDate(dt.getDate() + dias);
      return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}`;
    }

    /* Diferença em dias inteiros: (b - a). Positivo = b está no futuro. */
    function difDias(a, b) {
      return Math.round((dataLocal(b) - dataLocal(a)) / 86400000);
    }

    function fmtData(str)      { const [a, m, d] = str.split("-"); return `${d}/${m}`; }
    function fmtDataLonga(str) { const [a, m, d] = str.split("-"); return `${d}/${m}/${a}`; }

    /* -----------------------------------------------------------------
       FREQUÊNCIAS PADRONIZADAS — cada uma vira um intervalo em dias.
       "dias: null" = "conforme necessidade" (sem agendamento).
       Obs.: "2x ao dia" é simplificado como diário pro cálculo da
       próxima data — a contagem de vezes no dia fica por sua conta.
       ----------------------------------------------------------------- */
    const FREQS = [
      { id: "2x_dia",     nome: "2x ao dia",            dias: 1 },
      { id: "diario",     nome: "Diariamente",          dias: 1 },
      { id: "2_dias",     nome: "A cada 2 dias",        dias: 2 },
      { id: "semanal",    nome: "Semanal",              dias: 7 },
      { id: "quinzenal",  nome: "Quinzenal",            dias: 15 },
      { id: "mensal",     nome: "Mensal",               dias: 30 },
      { id: "bimestral",  nome: "Bimestral",            dias: 60 },
      { id: "trimestral", nome: "Trimestral",           dias: 90 },
      { id: "semestral",  nome: "Semestral",            dias: 180 },
      { id: "anual",      nome: "Anual",                dias: 365 },
      { id: "conforme",   nome: "Conforme necessidade", dias: null },
    ];
    function freqInfo(id) { return FREQS.find(f => f.id === id) || FREQS[1]; }

    /* Ícones disponíveis pra escolher numa categoria. */
    const ICONES = [
      "fa-pump-soap", "fa-tooth", "fa-scissors", "fa-spray-can-sparkles", "fa-soap",
      "fa-hand-sparkles", "fa-bed", "fa-glass-water", "fa-stethoscope", "fa-dumbbell",
      "fa-shirt", "fa-broom", "fa-droplet", "fa-heart-pulse", "fa-spa", "fa-shower",
      "fa-wind", "fa-star", "fa-eye", "fa-bath",
    ];

    /* -----------------------------------------------------------------
       ESTRUTURA INICIAL — só na primeira vez que você abre a página.
       Já vem com as 12 categorias e dezenas de cuidados do seu documento.
       Os cuidados de higiene/aparência começam "feitos hoje" (pra você
       abrir num estado calmo), e os de saúde preventiva começam "a
       iniciar" (pra aparecerem como pendências a agendar).
       ----------------------------------------------------------------- */
    function estruturaInicial() {
      const HOJE = hojeStr();

      const categorias = [
        { id: "cabelo", nome: "Cabelo, Barba e Pelos", icone: "fa-scissors",      subs: [{ id: "cab-cabelo", nome: "Cabelo" }, { id: "cab-barba", nome: "Barba" }, { id: "cab-pelos", nome: "Pelos" }] },
        { id: "dentes", nome: "Dentes",                icone: "fa-tooth",         subs: [] },
        { id: "pele",   nome: "Pele",                  icone: "fa-pump-soap",     subs: [{ id: "pele-rosto", nome: "Rosto" }, { id: "pele-corpo", nome: "Corpo" }] },
        { id: "cheiro", nome: "Cheiro",                icone: "fa-wind",          subs: [] },
        { id: "unhas",  nome: "Unhas",                 icone: "fa-hand-sparkles", subs: [{ id: "unhas-maos", nome: "Mãos" }, { id: "unhas-pes", nome: "Pés" }] },
      ];

      /* [categoria, subcategoria, nome, frequência, prioridade] */
      const SEED = [
        /* ---- Cabelo, Barba e Pelos ---- */
        ["cabelo", "cab-cabelo", "Lavar o cabelo", "2_dias", "media"],
        ["cabelo", "cab-cabelo", "Condicionador", "2_dias", "baixa"],
        ["cabelo", "cab-cabelo", "Hidratação capilar", "semanal", "baixa"],
        ["cabelo", "cab-cabelo", "Shampoo específico", "semanal", "baixa"],
        ["cabelo", "cab-cabelo", "Cortar o cabelo no barbeiro", "mensal", "media"],
        ["cabelo", "cab-cabelo", "Limpar pente/escova", "quinzenal", "baixa"],
        ["cabelo", "cab-barba", "Fazer/aparar a barba", "2_dias", "media"],
        ["cabelo", "cab-barba", "Óleo/balm para barba", "diario", "baixa"],
        ["cabelo", "cab-barba", "Desenhar a barba no barbeiro", "mensal", "baixa"],
        ["cabelo", "cab-pelos", "Aparar pelos do nariz", "quinzenal", "media"],
        ["cabelo", "cab-pelos", "Aparar pelos da orelha", "mensal", "baixa"],
        ["cabelo", "cab-pelos", "Aparar a sobrancelha", "mensal", "baixa"],
        ["cabelo", "cab-pelos", "Depilar/aparar pelos corporais", "mensal", "baixa"],

        /* ---- Dentes ---- */
        ["dentes", "", "Escovar os dentes", "2x_dia", "alta"],
        ["dentes", "", "Fio dental", "diario", "alta"],
        ["dentes", "", "Raspar a língua", "diario", "media"],
        ["dentes", "", "Enxaguante bucal", "diario", "baixa"],
        ["dentes", "", "Trocar a escova", "trimestral", "media"],
        ["dentes", "", "Limpeza no dentista", "semestral", "alta"],
        ["dentes", "", "Clareamento", "conforme", "baixa"],

        /* ---- Pele ---- */
        ["pele", "pele-rosto", "Lavar o rosto", "diario", "alta"],
        ["pele", "pele-rosto", "Hidratante facial", "diario", "media"],
        ["pele", "pele-rosto", "Protetor solar", "diario", "alta"],
        ["pele", "pele-rosto", "Esfoliação facial", "semanal", "baixa"],
        ["pele", "pele-rosto", "Máscara facial", "semanal", "baixa"],
        ["pele", "pele-corpo", "Hidratação corporal", "diario", "media"],
        ["pele", "pele-corpo", "Esfoliação corporal", "semanal", "baixa"],

        /* ---- Cheiro ---- */
        ["cheiro", "", "Banho", "diario", "alta"],
        ["cheiro", "", "Desodorante antitranspirante", "diario", "alta"],
        ["cheiro", "", "Perfume", "diario", "baixa"],
        ["cheiro", "", "Trocar as toalhas", "semanal", "media"],
        ["cheiro", "", "Trocar a roupa de cama", "semanal", "media"],
        ["cheiro", "", "Lavar as roupas de treino", "2_dias", "media"],
        ["cheiro", "", "Higienizar o tênis", "mensal", "baixa"],

        /* ---- Unhas ---- */
        ["unhas", "unhas-maos", "Cortar as unhas das mãos", "semanal", "media"],
        ["unhas", "unhas-maos", "Lixar as unhas das mãos", "semanal", "baixa"],
        ["unhas", "unhas-maos", "Limpar as unhas das mãos", "semanal", "baixa"],
        ["unhas", "unhas-pes", "Cortar as unhas dos pés", "quinzenal", "media"],
        ["unhas", "unhas-pes", "Lixar as unhas dos pés", "quinzenal", "baixa"],
        ["unhas", "unhas-pes", "Hidratar os pés", "semanal", "baixa"],
        ["unhas", "unhas-pes", "Remover calos", "mensal", "baixa"],
      ];

      /* Cuidados de rotina curta começam "feitos hoje" (abertura calma);
         os de intervalo longo começam "a iniciar" pra aparecerem como pendência. */
      const FEITOS = ["2x_dia", "diario", "2_dias", "semanal"];
      const cuidados = SEED.map((s, i) => {
        const feito = FEITOS.includes(s[3]);
        return {
          id: "c" + (i + 1),
          catId: s[0], subId: s[1] || "", nome: s[2],
          frequencia: s[3], prioridade: s[4] || "media",
          ultima: feito ? HOJE : "", tempo: "", obs: "",
          historico: feito ? [HOJE] : [], arquivado: false,
        };
      });

      return { categorias, cuidados };
    }

    /* Lê o que está salvo; se for a primeira vez, usa a estrutura inicial. */
    let dados = Store.ler(CHAVE, null) || estruturaInicial();
    dados.categorias = dados.categorias || [];
    dados.cuidados   = dados.cuidados   || [];

    function salvar() { Store.salvar(CHAVE, dados); }
    function novoId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function get(id)  { return dados.cuidados.find(c => c.id === id); }
    function catById(id) { return dados.categorias.find(c => c.id === id); }

    function esc(t) {
      return String(t ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function pesoPrio(c) { return c.prioridade === "alta" ? 3 : c.prioridade === "baixa" ? 1 : 2; }
    function corDoScore(p) { return p >= 80 ? "#10b981" : p >= 50 ? "#f59e0b" : "#ef4444"; }

    /* -----------------------------------------------------------------
       O CÉREBRO: próxima execução + status (calculados, nunca guardados)
       ----------------------------------------------------------------- */
    function proximaExecucao(c) {
      const f = freqInfo(c.frequencia);
      if (f.dias === null) return null;   /* conforme necessidade */
      if (!c.ultima) return null;          /* nunca feito */
      return somarDias(c.ultima, f.dias);
    }

    /* Quantos dias antes do vencimento já contam como "Próximo". */
    function janelaProximo(f) {
      if (f.dias <= 2) return 0;
      return Math.min(Math.max(Math.round(f.dias * 0.15), 1), 20);
    }

    function statusCuidado(c) {
      const f = freqInfo(c.frequencia);
      if (f.dias === null) return { id: "livre", label: "Livre" };
      if (!c.ultima)       return { id: "pendente", label: "A iniciar" };
      const prox = proximaExecucao(c);
      const dif = difDias(hojeStr(), prox);     /* prox - hoje */
      if (dif < 0)  return { id: "atrasado", label: `Atrasado ${Math.abs(dif)}d` };
      if (dif === 0) return { id: "hoje", label: "Vence hoje" };
      if (dif <= janelaProximo(f)) return { id: "proximo", label: `Em ${dif}d` };
      return { id: "emdia", label: "Em dia" };
    }

    /* Score = % dos cuidados agendáveis que NÃO estão atrasados nem parados.
       (conforme necessidade e arquivados ficam de fora da conta.) */
    function calcularScore(lista) {
      const sched = lista.filter(c => !c.arquivado && freqInfo(c.frequencia).dias !== null);
      if (!sched.length) return 100;
      const bons = sched.filter(c => {
        const s = statusCuidado(c).id;
        return s === "emdia" || s === "proximo" || s === "hoje";
      }).length;
      return Math.round(bons / sched.length * 100);
    }

    /* Escolhe o "próximo cuidado importante" pro dashboard. */
    function proximoImportante() {
      const lista = dados.cuidados.filter(c => !c.arquivado && freqInfo(c.frequencia).dias !== null);
      if (!lista.length) return null;
      const mapeado = lista.map(c => {
        const prox = proximaExecucao(c);
        let dif;
        if (!c.ultima) dif = 0;                       /* a iniciar = vence agora */
        else dif = difDias(hojeStr(), prox);
        return { c, dif };
      });
      /* mais atrasado/urgente primeiro; empate, maior prioridade */
      mapeado.sort((a, b) => a.dif - b.dif || pesoPrio(b.c) - pesoPrio(a.c));
      return mapeado[0];
    }

    /* =================================================================
       ESTADO DA TELA (qual visão e qual filtro)
       ================================================================= */
    let vista = "hoje";       /* "hoje" | "cat" */
    let filtroCat = "todos";

    function setVista(v)  { vista = v; render(); }
    function setFiltro(id){ filtroCat = id; render(); }

    function render() {
      renderDashboard();
      document.getElementById("vw-hoje").classList.toggle("is-active", vista === "hoje");
      document.getElementById("vw-cat").classList.toggle("is-active", vista === "cat");
      const filtros = document.getElementById("ac-filtros");
      filtros.style.display = vista === "cat" ? "flex" : "none";
      if (vista === "cat") renderFiltros();
      document.getElementById("ac-conteudo").innerHTML = vista === "hoje" ? renderHoje() : renderCat();
    }

    /* ---------- DASHBOARD ---------- */
    function renderDashboard() {
      const ativos = dados.cuidados.filter(c => !c.arquivado);
      const score = calcularScore(ativos);
      const cor = corDoScore(score);
      const pend = ativos.filter(c => {
        const s = statusCuidado(c).id;
        return s === "atrasado" || s === "hoje" || s === "pendente";
      }).length;

      const prox = proximoImportante();
      let proxTxt = "Tudo tranquilo", proxSub = "Nada urgente agora";
      if (prox) { proxTxt = prox.c.nome; proxSub = statusCuidado(prox.c).label; }

      const catRows = dados.categorias.map(cat => {
        const lista = ativos.filter(c => c.catId === cat.id);
        const temSched = lista.some(c => freqInfo(c.frequencia).dias !== null);
        if (!temSched) return "";
        const sc = calcularScore(lista);
        return `
          <div class="ac-catscore">
            <span class="ac-catscore__nome"><i class="fa-solid ${cat.icone}"></i> ${esc(cat.nome)}</span>
            <span class="ac-catscore__pct" style="color:${corDoScore(sc)}">${sc}%</span>
            <span class="ac-csbar"><i style="width:${sc}%; background:${corDoScore(sc)}"></i></span>
          </div>`;
      }).join("");

      document.getElementById("ac-dash").innerHTML = `
        <div class="card ac-dash">
          <div class="ac-dash__top">
            <div class="ring" style="--p:${score}; --cor:${cor}">
              <div class="ring__hole">
                <div>
                  <div class="ring__num" style="color:${cor}">${score}%</div>
                  <div class="ring__lbl">Autocuidado</div>
                </div>
              </div>
            </div>
            <div class="ac-tiles">
              <div class="ac-tile"><div class="ac-tile__num">${ativos.length}</div><div class="ac-tile__lbl">Cuidados</div></div>
              <div class="ac-tile"><div class="ac-tile__num" style="color:${pend ? '#f59e0b' : 'var(--accent)'}">${pend}</div><div class="ac-tile__lbl">Pendentes hoje</div></div>
              <div class="ac-tile">
                <div class="ac-tile__lbl">Próximo importante</div>
                <div class="ac-tile__hint">${esc(proxTxt)}</div>
                <div class="ac-tile__lbl" style="margin-top:3px">${esc(proxSub)}</div>
              </div>
            </div>
          </div>
          ${catRows ? `<div class="ac-catscores">${catRows}</div>` : ""}
        </div>`;
    }

    /* ---------- VISÃO "HOJE" ---------- */
    function renderHoje() {
      const ativos = dados.cuidados.filter(c => !c.arquivado);
      const precisa = ativos.filter(c => {
        const s = statusCuidado(c).id;
        return s === "atrasado" || s === "hoje" || s === "pendente";
      });
      const chegando = ativos.filter(c => statusCuidado(c).id === "proximo");

      const ordem = { atrasado: 0, hoje: 1, pendente: 2 };
      precisa.sort((a, b) => {
        const sa = statusCuidado(a), sb = statusCuidado(b);
        if (ordem[sa.id] !== ordem[sb.id]) return ordem[sa.id] - ordem[sb.id];
        const da = sa.id === "atrasado" ? difDias(hojeStr(), proximaExecucao(a)) : 0;
        const db = sb.id === "atrasado" ? difDias(hojeStr(), proximaExecucao(b)) : 0;
        if (da !== db) return da - db;
        return pesoPrio(b) - pesoPrio(a);
      });

      let html = "";
      if (!precisa.length) {
        html += `
          <div class="ac-tudoemdia">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Tudo em dia por hoje!</h3>
            <p>Nenhum cuidado pendente no momento. Planeje como um sábio, execute como um guerreiro.</p>
          </div>`;
      } else {
        html += `<p class="ac-grupo-tit">Precisa de atenção (${precisa.length})</p>`;
        html += precisa.map(c => linhaCuidado(c, true)).join("");
      }

      if (chegando.length) {
        chegando.sort((a, b) => difDias(hojeStr(), proximaExecucao(a)) - difDias(hojeStr(), proximaExecucao(b)));
        html += `<p class="ac-grupo-tit" style="margin-top:24px">Chegando</p>`;
        html += chegando.map(c => linhaCuidado(c, true)).join("");
      }
      return html;
    }

    /* ---------- VISÃO "POR CATEGORIA" ---------- */
    function renderFiltros() {
      const chips = [`<button class="ac-chip ${filtroCat === 'todos' ? 'is-active' : ''}" onclick="setFiltro('todos')">Todas</button>`]
        .concat(dados.categorias.map(c =>
          `<button class="ac-chip ${filtroCat === c.id ? 'is-active' : ''}" onclick="setFiltro('${c.id}')"><i class="fa-solid ${c.icone}"></i> ${esc(c.nome)}</button>`));
      document.getElementById("ac-filtros").innerHTML = chips.join("");
    }

    function renderCat() {
      const cats = filtroCat === "todos" ? dados.categorias : dados.categorias.filter(c => c.id === filtroCat);
      if (!cats.length) return `<p class="ac-vazio-mini">Nenhuma categoria.</p>`;

      return cats.map(cat => {
        const lista = dados.cuidados.filter(c => c.catId === cat.id && !c.arquivado);
        const temSched = lista.some(c => freqInfo(c.frequencia).dias !== null);
        const sc = temSched ? calcularScore(lista) : null;

        let corpo = "";
        if (!lista.length) {
          corpo = `<p class="ac-vazio-mini">Nenhum cuidado nesta categoria.</p>`;
        } else if (cat.subs.length) {
          cat.subs.forEach(s => {
            const itens = lista.filter(c => c.subId === s.id);
            if (itens.length) corpo += `<p class="ac-subtit">${esc(s.nome)}</p>` + itens.map(c => linhaCuidado(c, false)).join("");
          });
          const orfaos = lista.filter(c => !c.subId || !cat.subs.some(s => s.id === c.subId));
          if (orfaos.length) corpo += `<p class="ac-subtit">Outros</p>` + orfaos.map(c => linhaCuidado(c, false)).join("");
        } else {
          corpo = lista.map(c => linhaCuidado(c, false)).join("");
        }

        return `
          <section class="ac-catcard">
            <header class="ac-catcard__head">
              <span class="ac-catcard__icone"><i class="fa-solid ${cat.icone}"></i></span>
              <div style="flex:1; min-width:0">
                <div class="ac-catcard__nome">${esc(cat.nome)}</div>
                <div class="ac-catcard__count">${lista.length} cuidado(s)${sc !== null ? ` · <b style="color:${corDoScore(sc)}">${sc}%</b> em dia` : ""}</div>
              </div>
              <button class="ac-add" onclick="abrirNovoCuidado('${cat.id}')"><i class="fa-solid fa-plus"></i> Add</button>
            </header>
            ${corpo}
          </section>`;
      }).join("");
    }

    /* ---------- LINHA DE UM CUIDADO ---------- */
    function linhaCuidado(c, mostrarCat) {
      const st = statusCuidado(c);
      const cat = catById(c.catId);
      const sub = (cat && c.subId) ? (cat.subs.find(s => s.id === c.subId) || {}).nome : "";
      const f = freqInfo(c.frequencia);
      const prox = proximaExecucao(c);
      const feitoHoje = c.ultima === hojeStr();

      const meta = [];
      if (mostrarCat && cat) meta.push(`<i class="fa-solid ${cat.icone}"></i>${esc(cat.nome)}${sub ? " · " + esc(sub) : ""}`);
      meta.push(esc(f.nome));
      if (c.tempo) meta.push(`${esc(String(c.tempo))} min`);
      if (prox && st.id !== "pendente") meta.push(`Próx: ${fmtData(prox)}`);

      const feitoBtn = feitoHoje
        ? `<button class="ac-feito ac-feito--done" onclick="desfazerUltimo('${c.id}')" title="Desfazer"><i class="fa-solid fa-check"></i> Feito</button>`
        : `<button class="ac-feito" onclick="marcarFeito('${c.id}')"><i class="fa-solid fa-check"></i> Feito</button>`;

      return `
        <div class="ac-row">
          <span class="prio prio--${c.prioridade}" title="Prioridade: ${c.prioridade}"></span>
          <div class="ac-row__main">
            <div class="ac-row__nome">${esc(c.nome)}</div>
            <div class="ac-row__meta">${meta.map(m => `<span>${m}</span>`).join("")}</div>
          </div>
          <div class="ac-row__dir">
            <span class="st st--${st.id}">${esc(st.label)}</span>
            ${feitoBtn}
            <button class="mini" onclick="abrirHistorico('${c.id}')" title="Histórico"><i class="fa-solid fa-clock-rotate-left"></i></button>
            <button class="mini" onclick="editarCuidado('${c.id}')" title="Editar"><i class="fa-solid fa-pen"></i></button>
            <button class="mini" onclick="arquivarCuidado('${c.id}')" title="Arquivar"><i class="fa-solid fa-box-archive"></i></button>
          </div>
        </div>`;
    }

    /* =================================================================
       AÇÕES DO DIA A DIA — marcar feito / desfazer
       ================================================================= */
    function marcarFeito(id) {
      const c = get(id); if (!c) return;
      const h = hojeStr();
      if (c.historico[c.historico.length - 1] !== h) c.historico.push(h);
      c.ultima = h;
      salvar(); render(); avisar(`"${c.nome}" — feito hoje.`, "fa-check");
    }

    function desfazerUltimo(id) {
      const c = get(id); if (!c || !c.historico.length) return;
      c.historico.pop();
      c.ultima = c.historico[c.historico.length - 1] || "";
      salvar(); render();
      if (document.getElementById("modal-historico").classList.contains("is-open")) renderHistorico();
      avisar("Execução desfeita.", "fa-rotate-left");
    }

    /* =================================================================
       CRUD — CUIDADOS
       ================================================================= */
    function opcoesCats(sel) {
      return dados.categorias.map(c => `<option value="${c.id}" ${c.id === sel ? "selected" : ""}>${esc(c.nome)}</option>`).join("");
    }
    function opcoesSubs(catId, sel) {
      const cat = catById(catId);
      if (!cat) return "";
      return `<option value="">— nenhuma —</option>` +
        cat.subs.map(s => `<option value="${s.id}" ${s.id === sel ? "selected" : ""}>${esc(s.nome)}</option>`).join("");
    }
    function opcoesFreq(sel) {
      return FREQS.map(f => `<option value="${f.id}" ${f.id === sel ? "selected" : ""}>${esc(f.nome)}</option>`).join("");
    }

    /* Quando troca a categoria, recarrega (ou esconde) a subcategoria. */
    function onCatChange() {
      const catId = document.getElementById("ac-c-cat").value;
      const cat = catById(catId);
      const campo = document.getElementById("ac-c-sub-campo");
      const sel = document.getElementById("ac-c-sub");
      if (cat && cat.subs.length) { sel.innerHTML = opcoesSubs(catId, ""); campo.style.display = "block"; }
      else { sel.innerHTML = ""; campo.style.display = "none"; }
    }

    function abrirNovoCuidado(catId, subId) {
      if (!dados.categorias.length) { avisar("Crie uma categoria primeiro.", "fa-circle-exclamation"); return; }
      document.getElementById("ac-c-id").value = "";
      document.getElementById("ac-c-titulo").innerHTML = `<i class="fa-solid fa-plus" style="color:var(--accent)"></i> Novo cuidado`;
      document.getElementById("ac-c-info").style.display = "none";
      document.getElementById("ac-c-nome").value = "";
      document.getElementById("ac-c-cat").innerHTML = opcoesCats(catId);
      onCatChange();
      if (subId) document.getElementById("ac-c-sub").value = subId;
      document.getElementById("ac-c-freq").innerHTML = opcoesFreq("diario");
      document.getElementById("ac-c-prio").value = "media";
      document.getElementById("ac-c-tempo").value = "";
      document.getElementById("ac-c-ultima").value = "";
      document.getElementById("ac-c-obs").value = "";
      abrir("modal-cuidado");
      setTimeout(() => document.getElementById("ac-c-nome").focus(), 50);
    }

    function editarCuidado(id) {
      const c = get(id); if (!c) return;
      document.getElementById("ac-c-id").value = c.id;
      document.getElementById("ac-c-titulo").innerHTML = `<i class="fa-solid fa-pen" style="color:var(--accent)"></i> Editar cuidado`;

      /* Bloco de info só-leitura: próxima execução + status calculados */
      const prox = proximaExecucao(c);
      const st = statusCuidado(c);
      const f = freqInfo(c.frequencia);
      const proxTxt = prox ? fmtDataLonga(prox) : (f.dias === null ? "—" : "Assim que possível");
      const info = document.getElementById("ac-c-info");
      info.innerHTML = `
        <div class="ac-info__item"><span>Próxima execução</span>${proxTxt}</div>
        <div class="ac-info__item"><span>Status</span><span class="st st--${st.id}">${st.label}</span></div>`;
      info.style.display = "flex";

      document.getElementById("ac-c-nome").value = c.nome;
      document.getElementById("ac-c-cat").innerHTML = opcoesCats(c.catId);
      onCatChange();
      document.getElementById("ac-c-sub").value = c.subId || "";
      document.getElementById("ac-c-freq").innerHTML = opcoesFreq(c.frequencia);
      document.getElementById("ac-c-prio").value = c.prioridade;
      document.getElementById("ac-c-tempo").value = c.tempo || "";
      document.getElementById("ac-c-ultima").value = c.ultima || "";
      document.getElementById("ac-c-obs").value = c.obs || "";
      abrir("modal-cuidado");
    }

    function salvarCuidado() {
      const id     = document.getElementById("ac-c-id").value;
      const nome   = document.getElementById("ac-c-nome").value.trim();
      const catId  = document.getElementById("ac-c-cat").value;
      const subId  = document.getElementById("ac-c-sub").value || "";
      const freq   = document.getElementById("ac-c-freq").value;
      const prio   = document.getElementById("ac-c-prio").value;
      const tempo  = document.getElementById("ac-c-tempo").value.trim();
      const ultima = document.getElementById("ac-c-ultima").value;   /* "AAAA-MM-DD" ou "" */
      const obs    = document.getElementById("ac-c-obs").value.trim();

      if (!nome || !catId) { avisar("Preencha o nome e a categoria.", "fa-circle-exclamation"); return; }

      if (id) {
        const c = get(id);
        Object.assign(c, { nome, catId, subId, frequencia: freq, prioridade: prio, tempo, ultima, obs });
        /* Se você definiu uma data de última execução, registra no histórico. */
        if (ultima && c.historico[c.historico.length - 1] !== ultima) c.historico.push(ultima);
      } else {
        dados.cuidados.push({
          id: novoId(), nome, catId, subId, frequencia: freq, prioridade: prio,
          tempo, ultima, obs, historico: ultima ? [ultima] : [], arquivado: false,
        });
      }
      salvar(); render(); fechar("modal-cuidado"); avisar("Cuidado salvo.");
    }

    function arquivarCuidado(id) {
      const c = get(id); if (!c) return;
      c.arquivado = true; salvar(); render(); avisar("Cuidado arquivado.", "fa-box-archive");
    }
    function restaurarCuidado(id) {
      const c = get(id); if (!c) return;
      c.arquivado = false; salvar(); render(); renderCofre(); avisar("Cuidado restaurado.");
    }
    function excluirCuidado(id) {
      pedirConfirmacao("Excluir este cuidado de vez? Não dá pra desfazer.", () => {
        dados.cuidados = dados.cuidados.filter(x => x.id !== id);
        salvar(); render(); renderCofre(); avisar("Cuidado excluído.", "fa-trash");
      });
    }

    /* =================================================================
       HISTÓRICO
       ================================================================= */
    let _histId = null;
    function abrirHistorico(id) { _histId = id; renderHistorico(); abrir("modal-historico"); }
    function renderHistorico() {
      const c = get(_histId); if (!c) return;
      document.getElementById("ac-hist-titulo").textContent = c.nome;
      const box = document.getElementById("ac-hist-lista");
      if (!c.historico.length) {
        box.innerHTML = `<p class="ac-vazio-mini" style="text-align:center; padding:18px 0">Nenhuma execução registrada ainda.</p>`;
        return;
      }
      box.innerHTML = [...c.historico].reverse().map((d, i) => `
        <div class="ac-linha">
          <span class="ac-linha__nome"><i class="fa-solid fa-check" style="color:var(--accent); margin-right:8px"></i>${fmtDataLonga(d)}</span>
          ${i === 0 ? `<button class="mini" onclick="desfazerUltimo('${c.id}')" title="Desfazer"><i class="fa-solid fa-rotate-left"></i></button>` : ""}
        </div>`).join("");
    }

    /* =================================================================
       CRUD — CATEGORIAS (com gerenciador de subcategorias)
       ================================================================= */
    function abrirCats() { renderCats(); abrir("modal-cats"); }
    function renderCats() {
      const box = document.getElementById("ac-lista-cats");
      if (!dados.categorias.length) { box.innerHTML = `<p class="ac-vazio-mini" style="text-align:center; padding:20px 0">Nenhuma categoria.</p>`; return; }
      box.innerHTML = dados.categorias.map(cat => {
        const qtd = dados.cuidados.filter(c => c.catId === cat.id && !c.arquivado).length;
        return `
          <div class="ac-linha">
            <div class="ac-linha__id">
              <span class="ac-mini-icone"><i class="fa-solid ${cat.icone}"></i></span>
              <div>
                <p class="ac-linha__nome">${esc(cat.nome)}</p>
                <p class="ac-linha__meta">${qtd} cuidado(s)${cat.subs.length ? ` · ${cat.subs.length} sub` : ""}</p>
              </div>
            </div>
            <div class="ac-row__dir">
              <button class="mini" onclick="editarCat('${cat.id}')" aria-label="Editar"><i class="fa-solid fa-pen"></i></button>
              <button class="mini mini--perigo" onclick="excluirCat('${cat.id}')" aria-label="Excluir"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>`;
      }).join("");
    }

    /* Lista temporária de subcategorias enquanto você edita uma categoria. */
    let _subsEdit = [];
    function renderSubchips() {
      const box = document.getElementById("ac-cat-subs");
      box.innerHTML = _subsEdit.map(s => `
        <span class="ac-subchip">${esc(s.nome)}
          <button onclick="removeSubEdit('${s.id}')" title="Remover"><i class="fa-solid fa-xmark"></i></button>
        </span>`).join("");
    }
    function addSubEdit() {
      const inp = document.getElementById("ac-cat-subinput");
      const nome = inp.value.trim();
      if (!nome) return;
      _subsEdit.push({ id: novoId(), nome });
      inp.value = ""; renderSubchips(); inp.focus();
    }
    function removeSubEdit(id) { _subsEdit = _subsEdit.filter(s => s.id !== id); renderSubchips(); }

    function preencherIconesCat(sel) {
      document.getElementById("ac-cat-icone").innerHTML =
        ICONES.map(ic => `<option value="${ic}" ${ic === sel ? "selected" : ""}>${ic.replace("fa-", "")}</option>`).join("");
    }

    function abrirNovaCat() {
      document.getElementById("ac-cat-id").value = "";
      document.getElementById("ac-cat-titulo").innerHTML = `<i class="fa-solid fa-layer-group" style="color:var(--accent)"></i> Nova categoria`;
      document.getElementById("ac-cat-nome").value = "";
      preencherIconesCat("fa-pump-soap");
      _subsEdit = []; renderSubchips();
      abrir("modal-catedit");
      setTimeout(() => document.getElementById("ac-cat-nome").focus(), 50);
    }

    function editarCat(id) {
      const cat = catById(id); if (!cat) return;
      document.getElementById("ac-cat-id").value = cat.id;
      document.getElementById("ac-cat-titulo").innerHTML = `<i class="fa-solid fa-pen" style="color:var(--accent)"></i> Editar categoria`;
      document.getElementById("ac-cat-nome").value = cat.nome;
      preencherIconesCat(cat.icone);
      _subsEdit = cat.subs.map(s => ({ ...s }));   /* cópia pra não bagunçar o original antes de salvar */
      renderSubchips();
      abrir("modal-catedit");
    }

    function salvarCat() {
      const id    = document.getElementById("ac-cat-id").value;
      const nome  = document.getElementById("ac-cat-nome").value.trim();
      const icone = document.getElementById("ac-cat-icone").value;
      if (!nome) { avisar("Dê um nome à categoria.", "fa-circle-exclamation"); return; }
      const subs = _subsEdit.slice();

      if (id) {
        const cat = catById(id);
        cat.nome = nome; cat.icone = icone; cat.subs = subs;
        /* Se uma subcategoria foi removida, os cuidados dela viram "sem sub". */
        dados.cuidados.forEach(c => {
          if (c.catId === id && c.subId && !subs.some(s => s.id === c.subId)) c.subId = "";
        });
      } else {
        dados.categorias.push({ id: novoId(), nome, icone, subs });
      }
      salvar(); render(); renderCats(); fechar("modal-catedit"); avisar("Categoria salva.");
    }

    function excluirCat(id) {
      if (dados.cuidados.some(c => c.catId === id)) {
        avisar("Esta categoria ainda tem cuidados. Esvazie-a antes.", "fa-circle-exclamation");
        return;
      }
      pedirConfirmacao("Excluir esta categoria?", () => {
        dados.categorias = dados.categorias.filter(c => c.id !== id);
        if (filtroCat === id) filtroCat = "todos";
        salvar(); render(); renderCats(); avisar("Categoria excluída.", "fa-trash");
      });
    }

    /* =================================================================
       COFRE (arquivados)
       ================================================================= */
    function abrirCofre() { renderCofre(); abrir("modal-cofre"); }
    function renderCofre() {
      const box = document.getElementById("ac-lista-cofre");
      const arq = dados.cuidados.filter(c => c.arquivado);
      if (!arq.length) { box.innerHTML = `<p class="ac-vazio-mini" style="text-align:center; padding:24px 0">Nada arquivado por aqui.</p>`; return; }
      box.innerHTML = arq.map(c => {
        const cat = catById(c.catId);
        const icone = cat ? `<span class="ac-mini-icone"><i class="fa-solid ${cat.icone}"></i></span>` : "";
        return `
          <div class="ac-linha">
            <div class="ac-linha__id">
              ${icone}
              <div>
                <p class="ac-linha__nome ac-risco">${esc(c.nome)}</p>
                <p class="ac-linha__meta">${cat ? esc(cat.nome) : "Sem categoria"}</p>
              </div>
            </div>
            <div class="ac-row__dir">
              <button class="mini" onclick="restaurarCuidado('${c.id}')" title="Restaurar"><i class="fa-solid fa-rotate-left"></i></button>
              <button class="mini mini--perigo" onclick="excluirCuidado('${c.id}')" title="Excluir"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>`;
      }).join("");
    }

    /* =================================================================
       UTILIDADES DE MODAL — abrir/fechar, confirmação e aviso
       ================================================================= */
    function abrir(id)  { document.getElementById(id).classList.add("is-open"); }
    function fechar(id) { document.getElementById(id).classList.remove("is-open"); }
    function fundoModal(e, id) { if (e.target.id === id) fechar(id); }

    let _toastTimer = null;
    function avisar(msg, icone = "fa-circle-check") {
      const t = document.getElementById("ac-toast");
      t.innerHTML = `<i class="fa-solid ${icone}"></i> ${esc(msg)}`;
      t.classList.add("is-open");
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove("is-open"), 2600);
    }

    let _confirmaCb = null;
    function pedirConfirmacao(msg, cb) {
      document.getElementById("ac-confirma-msg").textContent = msg;
      _confirmaCb = cb; abrir("modal-confirma");
    }
    function confirmarAcao() { const f = _confirmaCb; _confirmaCb = null; fechar("modal-confirma"); if (f) f(); }
    function cancelarConfirma() { _confirmaCb = null; fechar("modal-confirma"); }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        document.querySelectorAll(".modal.is-open").forEach(m => m.classList.remove("is-open"));
        _confirmaCb = null;
      }
    });

    /* PARTIDA: desenha a tela. (O app.js já montou sidebar/tema/rodapé.) */
    render();
  </script>
</body>
</html>
